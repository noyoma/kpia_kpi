<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 성과 및 업무 통합 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.08);
  --text: #e8eaf0; --text2: #a1a8b5; --text3: #636b7f;
  --accent: #5b7cff; --accent-light: rgba(91,124,255,0.15);
  --orange: #ff6b00; --orange-light: rgba(255,107,0,0.15);
  --green: #22c55e; --red: #ef4444;
  --topbar-h: 74px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
.login-box .modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text); margin-bottom: 15px; outline: none; }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

/* 사이드바 */
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.logo-section { padding: 40px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: 2px; margin-top: 10px; }
.nav { padding: 15px 0; flex: 1; overflow-y: auto; }
.nav-group-header { padding: 16px 24px; font-size: 13px; font-weight: 900; color: var(--text3); text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 30px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; margin: 2px 10px; border-radius: 12px; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 800; }

/* 메인 영역 스크롤 설정 */
.main { flex: 1; overflow-y: auto; background: #0a0c10; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }

/* 고정 상단바 */
.topbar { 
  height: var(--topbar-h); min-height: var(--topbar-h); padding: 0 40px; border-bottom: 1px solid var(--border); 
  display: grid; grid-template-columns: 1.2fr auto 1.2fr; align-items: center; 
  background: rgba(13, 15, 20, 0.98); backdrop-filter: blur(20px); 
  position: sticky; top: 0; z-index: 1000; 
}
.topbar h2 { font-size: 20px; font-weight: 900; color: #fff; }

/* 상단 중앙 날짜 선택 박스 정렬 */
.date-selectors { display: flex; gap: 10px; align-items: center; justify-content: center; }
.grid-trigger { 
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; 
  padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 8px; transition: 0.2s;
}

/* ★ 스티키 LNB (퀵 내비게이션) - 상단바 바로 아래 고정 ★ */
.lnb-wrapper { 
  position: sticky; top: var(--topbar-h); z-index: 900; 
  padding: 15px 40px; background: rgba(10, 12, 18, 0.95); 
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); 
}
.lnb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; max-width: 1400px; margin: 0 auto; }
.lnb-item { 
  background: var(--bg3); border: 1px solid var(--border); padding: 12px; border-radius: 10px; 
  font-size: 12px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; color: var(--text2); 
}
.lnb-item:hover, .lnb-item.active { border-color: var(--accent); color: #fff; background: var(--accent-light); }

.content { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* 패널 & 횡형 카드 */
.panel { scroll-margin-top: 160px; background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; margin-bottom: 50px; overflow: hidden; }
.panel-header { padding: 22px 30px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }

.tracking-card-wide { 
  background: var(--bg3); border-radius: 18px; padding: 25px 30px; border: 1px solid transparent; 
  display: grid; grid-template-columns: 280px 1fr; gap: 40px; align-items: center; transition: 0.2s; margin: 20px; cursor: pointer;
}
.tracking-card-wide:hover { border-color: var(--accent); background: #1e243a; transform: translateY(-2px); }

.data-row { display: grid; grid-template-columns: 110px 1fr; margin-bottom: 10px; }
.data-label { font-size: 11px; font-weight: 900; color: var(--text3); text-transform: uppercase; }
.data-val { font-size: 14.5px; color: var(--text2); line-height: 1.6; }

/* KPI 그리드 박스 */
.kpi-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.kpi-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 28px; position: relative; transition: 0.3s; }
.kpi-box:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.kpi-weight { position: absolute; top: 24px; right: 24px; background: var(--orange-light); color: var(--orange); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; }
.kpi-title { font-size: 17px; font-weight: 900; margin-bottom: 15px; color: #fff; padding-right: 60px; }
.kpi-guide { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* 로그 터미널 */
.log-terminal { background: #0a0c12; border-radius: 16px; padding: 25px; font-family: 'Fira Code', monospace; font-size: 12px; line-height: 1.6; border: 1px solid var(--border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.log-line { display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 8px 0; }
.action-등록 { color: var(--green); } .action-수정 { color: var(--accent); } .action-삭제 { color: var(--red); }

/* 공통 UI */
.btn-reg { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }
.selector-grid-popup { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 1100; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
.grid-item { padding: 12px; text-align: center; border-radius: 10px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; }
.grid-item.active { background: var(--accent); color: white; }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(8px); }
.modal { background: var(--bg2); width: 680px; border-radius: 32px; border: 1px solid var(--border); overflow: hidden; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
    <div style="font-size:14px; font-weight:800; margin-bottom:30px; color:var(--text3);">MANAGEMENT SYSTEM</div>
    <input type="text" id="login-id" class="modal-input" placeholder="아이디를 입력하세요">
    <input type="password" id="login-pw" class="modal-input" placeholder="비밀번호를 입력하세요">
    <button class="btn-reg" style="width:100%; padding:20px; font-size:15px;" onclick="handleLogin()">LOG IN</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
        <div class="logo-sub">PERFORMANCE HUB</div>
      </div>
      <div class="nav">
        <div class="nav-group-header">성과 관리 (KPI)</div>
        <div id="m-kpi-tracking" class="nav-item active" onclick="showView('tracking', 'kpi')">📊 월별 트래킹</div>
        <div id="m-kpi-history" class="nav-item" onclick="showView('history', 'kpi')">📅 연간 누적 현황</div>
        <div id="m-kpi-kpilist" class="nav-item" onclick="showView('kpilist', 'kpi')">📋 KPI 전체보기</div>
        <div id="m-kpi-logs" class="nav-item" onclick="showView('logs', 'kpi')">📜 변경 로그</div>
        
        <div class="nav-group-header" style="margin-top:20px;">주요 업무 (TASK)</div>
        <div id="m-task-tracking" class="nav-item" onclick="showView('tracking', 'task')">📊 월별 트래킹</div>
        <div id="m-task-history" class="nav-item" onclick="showView('history', 'task')">📅 연간 누적 현황</div>
        <div id="m-task-logs" class="nav-item" onclick="showView('logs', 'task')">📜 변경 로그</div>
        
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 40px; color: var(--red); opacity: 0.7;">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main" id="scroll-area">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors">
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div><div id="year-grid" class="selector-grid-popup"></div></div>
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div><div id="month-grid" class="selector-grid-popup"></div></div>
        </div>
        <div style="text-align: right; color: var(--text3); font-size: 11px; font-family: monospace;">KPIA_OS_v15.0</div>
      </div>
      <div id="sticky-lnb-area"></div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:25px 35px;"><h3 id="modal-title">데이터 기록</h3><button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:28px;">✕</button></div>
    <div class="modal-body" style="padding:35px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div><label style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">대상 월</label><select id="f-month" class="modal-input" onchange="updateModalLabels()"></select></div>
        <div><label id="label-team-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">분류</label><select id="f-team" class="modal-input" onchange="updateKpiOptions()"></select></div>
      </div>
      <div><label style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">항목</label><select id="f-kpi" class="modal-input"></select></div>
      <div><label id="label-last" style="display:block; font-size:12px; color:var(--green); margin-bottom:10px; font-weight:800;">실적 (전월)</label><textarea id="f-last" class="modal-input" style="height:100px;"></textarea></div>
      <div><label id="label-this" style="display:block; font-size:12px; color:var(--accent); margin-bottom:10px; font-weight:800;">계획 (금월)</label><textarea id="f-this" class="modal-input" style="height:100px;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:15px; margin-top:10px;"><button class="btn-reg" style="flex:2; padding:18px;" onclick="saveData()">데이터 저장</button><button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">삭제</button></div>
    </div>
  </div>
</div>

<script>
/* 1. 인증 및 엔터키 지원 */
function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === 'kpia' && p === 'kpia123!') { sessionStorage.setItem('k_token_final', btoa(Date.now())); checkAuth(); }
  else { alert("인증 정보가 올바르지 않습니다."); }
}
document.getElementById('login-pw').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
function checkAuth() { if (sessionStorage.getItem('k_token_final')) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; updateDateDisplays(); render(); } }

/* 2. 데이터 정의 */
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_TEAMS = ['기획홍보팀', '대외정책팀', '차트운영팀', '경영지원팀', '개발파트'];
const KPI_DATA_FULL = {
  '기획홍보팀': [{ item:'신규 사업 개발' }, { item:'협회 언론 대응' }, { item:'최소 보도량 달성률' }, { item:'MWM 콘퍼런스' }, { item:'써클차트 브랜딩' }],
  '대외정책팀': [{ item:'정책파트너십 강화' }, { item:'이슈 공론화' }, { item:'법안 입법관리' }, { item:'정책 아이템 개발' }],
  '차트운영팀': [{ item:'클린 데이터 선행관리' }, { item:'운영 효율화' }, { item:'브랜딩' }, { item:'파트너십 수익 증대' }],
  '경영지원팀': [{ item:'외부 회계감사 대응' }, { item:'내부 통제 강화' }, { item:'보상금 회계 프로세스 구축' }],
  '개발파트': [{ item:'시스템 안정 운영' }, { item:'시스템 개선' }, { item:'시스템 클라우드 이전' }, { item:'정산분배 시스템 런칭' }]
};

const TASK_TEAMS = ['음악산업 지원확대', '사업 환경 개선', '회원사 권익 보호', '회원사 지원 교류', '저작권 투명성 및 IT', '협회 자체 사업'];
const TASK_DATA_FULL = {
  '음악산업 지원확대': [
    { item:'정부의 대중음악 전담 조직 추진', owner:'우승현, 최태영' },
    { item:'K-뮤직 펀드 조성 추진', owner:'우승현, 전종봉' },
    { item:'음악관련 예산 증대 및 아이템 발굴', owner:'임숙형, 전종봉' },
    { item:'음반·MD 수출 관련 지원 정책 개발', owner:'우승현, 김창규' }
  ],
  '입법 대응': [
    { item:'대중법 일부개정 등 규제 강화 대응', owner:'최태영, 전종봉' },
    { item:'안무저작권 표준계약서 제정 지원', owner:'최태영, 전종봉' },
    { item:'음악산업 제작비 세액 공제 적용 추진', owner:'최태영, 전종봉' },
    { item:'AI 저작권 관련 업계 가이드 및 대응', owner:'최태영, 김창규' }
  ],
  '정책 기능 강화': [
    { item:'협회 내 정책연구소 설립 추진', owner:'우승현, 최태영' },
    { item:'MWM 콘퍼런스 품질 및 만족도 개선', owner:'임숙형' },
    { item:'국회 정책제안 포럼 정례 개최', owner:'최태영, 전종봉' }
  ],
  '회원사 권익보호': [
    { item:'근로시간 52시간 유연 적용 정책 대응', owner:'최태영, 전종봉' },
    { item:'전송서비스 사용료 징수규정 개정 대응', owner:'최태영, 김창규' },
    { item:'숏폼콘텐츠 사용료 징수규정 개정 대응', owner:'최태영, 김창규' },
    { item:'시상식 가이드라인 제정 및 발효', owner:'최태영, 전종봉' },
    { item:'음반 제작∙판매 조세특례 추진', owner:'최태영, 전종봉' }
  ],
  '회원사 지원교류': [
    { item:'대중음악 특성 인력 양성', owner:'최태영, 전종봉' },
    { item:'음악산업 리브랜딩 전략 수립', owner:'임숙형' },
    { item:'업계 및 회원사 사업 활동 기획', owner:'임숙형' },
    { item:'회원사 건강검진 단체계약 지원', owner:'전종봉' }
  ],
  '저작권 투명성 IT': [

    { item:'음원-권리정보 통합DB 관리 고도화', owner:'최태영, 김창규' },
    { item:'라이브러리음악 UCI 발급시스템 운영', owner:'최태영, 김창규' },
    { item:'K-팝 음원코드 체계 정비 추진', owner:'최태영, 김창규' }
  ],
  '협회 운영 및 자체사업': [
    { item:'써클차트 운영 및 고도화', owner:'정다운, 우승현' },
    { item:'K-팝 번역지원서비스 지원사업 운영', owner:'정다운' },
    { item:'감사제도 도입 및 내부 회계 정비', owner:'우승현, 이충근' },
    { item:'회계 컨설팅 및 외감/세무기장 관리', owner:'이충근, 최지원' },
    { item:'사무국 조직 효율화 및 성과 관리', owner:'우승현' }
  ]
};
  
let currentYear = 2026, currentMonth = 3, currentView = 'tracking', currentCategory = 'kpi', currentHistoryTeam = KPI_TEAMS[0];
let db = JSON.parse(localStorage.getItem('k_total_db_v6') || '[]');
let logs = JSON.parse(localStorage.getItem('k_total_logs_v6') || '[]');

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'), mg = document.getElementById('month-grid');
  yg.innerHTML = ""; mg.innerHTML = "";
  [2024, 2025, 2026, 2027].forEach(y => yg.innerHTML += `<div class="grid-item ${y===currentYear?'active':''}" onclick="currentYear=${y};updateDateDisplays();render();">${y}년</div>`);
  MONTHS.forEach((m,i) => mg.innerHTML += `<div class="grid-item ${i===currentMonth?'active':''}" onclick="currentMonth=${i};updateDateDisplays();render();">${m}</div>`);
}

function showView(view, category) {
  currentView = view; currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS : TASK_TEAMS)[0];
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const targetId = `m-${category}-${view}`;
  if(document.getElementById(targetId)) document.getElementById(targetId).classList.add('active');
  render();
}

/* 데이터 저장/모달 함수들 (기존 로직 유지) */
function openModal(id = null, teamHint = null, itemHint = null, monthHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS).map(t => `<option value="${t}">${t}</option>`).join('');
  if (id && id !== '') {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = monthHint; fTeam.value = teamHint;
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
  }
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  document.getElementById('f-kpi').innerHTML = list[t] ? list[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('') : '';
}
function saveData() {
  const id = document.getElementById('f-id').value || Date.now();
  const entry = { id, type: currentCategory, year: currentYear, month: parseInt(document.getElementById('f-month').value), team: document.getElementById('f-team').value, item: document.getElementById('f-kpi').value, lastDone: document.getElementById('f-last').value, thisPlan: document.getElementById('f-this').value };
  db = db.filter(d => String(d.id) !== String(id)); db.push(entry);
  localStorage.setItem('k_total_db_v6', JSON.stringify(db));
  logs.unshift({ time: new Date().toLocaleString(), action: id ? '수정' : '등록', category: currentCategory, team: entry.team, item: entry.item, details: '내용 저장됨' });
  localStorage.setItem('k_total_logs_v6', JSON.stringify(logs));
  closeModal(); render();
}
function deleteData() { if(confirm('삭제?')) { db = db.filter(d => String(d.id) !== String(document.getElementById('f-id').value)); localStorage.setItem('k_total_db_v6', JSON.stringify(db)); closeModal(); render(); } }
function togglePopup(e, id) { e.stopPropagation(); document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'grid'; }
function closeAllPopups() { document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }
function handleLogout() { sessionStorage.clear(); location.reload(); }
window.onload = checkAuth;
