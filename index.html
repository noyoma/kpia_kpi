<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 성과 및 업무 통합 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text2: #9ca3b0; --text3: #5c6275;
  --accent: #5b7cff; --accent2: #7b9aff;
  --orange: #ff6b00;
  --green: #22c55e; --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 화면 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 55px; border-radius: 28px; width: 400px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.7); }

.kpia-logo-svg { width: 110px; height: auto; display: block; margin: 0 auto 15px; overflow: visible; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1.8px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

.sidebar { width: 265px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
.logo-section { padding: 35px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; margin-top: 8px; }

.nav { padding: 10px 0; flex: 1; overflow-y: auto; }
.nav-group { margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.nav-group-header { 
  padding: 16px 20px; font-size: 13px; font-weight: 900; color: var(--text3); 
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  background: rgba(255,255,255,0.01); transition: 0.2s;
}
.nav-group-header:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-group-header i { font-style: normal; font-size: 10px; transition: transform 0.3s; }
.nav-group.closed .nav-group-content { display: none; }
.nav-group.closed .nav-group-header i { transform: rotate(-90deg); }

.nav-item { display: flex; align-items: center; gap: 12px; padding: 13px 25px; font-size: 13.5px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(91,124,255,0.1); color: var(--accent2); border-left-color: var(--accent); font-weight: 800; }

.topbar { padding: 18px 30px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1.2fr auto 1.2fr; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.topbar h2 { font-size: 18px; font-weight: 800; color: var(--text); }
.date-selectors { display: flex; gap: 12px; position: relative; justify-content: center; }
.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); }

.month-badge { font-size: 11px; color: var(--accent); font-weight: 800; margin-left: 8px; padding: 2px 8px; background: rgba(91,124,255,0.12); border-radius: 5px; border: 1px solid rgba(91,124,255,0.2); }

.shortcut-wrapper { margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); }
.shortcut-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.shortcut-btn { padding: 12px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); border-radius: 10px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; overflow: hidden; text-overflow: ellipsis; }
.shortcut-btn:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); }

.content { padding: 30px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; overflow: hidden; }
.panel-header { padding: 18px 22px; border-bottom: 1px solid var(--border); font-weight: 800; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }

/* 테이블 스타일 */
.kpi-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.kpi-table th { background: rgba(255,255,255,0.05); color: var(--text); font-weight: 800; padding: 15px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.kpi-table td { padding: 15px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); color: var(--text2); line-height: 1.6; }
.kpi-table tr:last-child td { border-bottom: none; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(6px); }
.modal { background: var(--bg2); width: 640px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.6); overflow: hidden; }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); margin-bottom: 15px; outline: none; }
.btn-reg { background: var(--accent); color: white; padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

.selector-grid-popup { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 1000; width: 280px; }
.grid-item { padding: 12px; text-align: center; border-radius: 8px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
    <div style="font-size:16px; font-weight:900; margin-bottom:25px; color:var(--text); opacity: 0.8;">MANAGEMENT SYSTEM</div>
    <input type="text" id="login-id" class="modal-input" placeholder="ID">
    <input type="password" id="login-pw" class="modal-input" placeholder="PASSWORD">
    <button class="btn-reg" style="width:100%; padding:18px; font-size:14px; font-weight:900;" onclick="handleLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
        <div class="logo-sub">PERFORMANCE & TASKS</div>
        <button class="btn-reg" style="font-size:10px; margin-top:25px; width:100%; opacity:0.8; font-weight:900;" onclick="exportToExcel()">📊 EXCEL EXPORT</button>
      </div>
      <div class="nav">
        <div class="nav-group" id="group-kpi">
          <div class="nav-group-header" onclick="toggleNavGroup('group-kpi')"><span>KPI 성과 관리</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-kpi-tracking" class="nav-item active" onclick="showView('tracking', 'kpi')">📊 월별 트래킹</div>
            <div id="m-kpi-history" class="nav-item" onclick="showView('history', 'kpi')">📅 연간 누적 현황</div>
            <div id="m-kpi-kpilist" class="nav-item" onclick="showView('kpilist', 'kpi')">📋 KPI 전체보기</div>
            <div id="m-kpi-logs" class="nav-item" onclick="showView('logs', 'kpi')">📜 변경 로그 (History)</div>
          </div>
        </div>
        <div class="nav-group" id="group-task">
          <div class="nav-group-header" onclick="toggleNavGroup('group-task')"><span>연간 주요 업무</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-task-tracking" class="nav-item" onclick="showView('tracking', 'task')">📊 월별 트래킹</div>
            <div id="m-task-history" class="nav-item" onclick="showView('history', 'task')">📅 연간 누적 현황</div>
            <div id="m-task-logs" class="nav-item" onclick="showView('logs', 'task')">📜 변경 로그 (History)</div>
          </div>
        </div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 30px; color: var(--red); font-weight: 800;">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main" id="scroll-area">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors" id="date-controls">
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div><div id="year-grid" class="selector-grid-popup"></div></div>
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div><div id="month-grid" class="selector-grid-popup"></div></div>
        </div>
        <div></div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:20px 25px;"><h3 id="modal-title">데이터 입력/수정</h3><button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:24px;">✕</button></div>
    <div class="modal-body" style="padding:28px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">대상 월</label><select id="f-month" class="modal-input" style="margin-bottom:0;" onchange="updateModalLabels()"></select></div>
        <div><label id="label-team-type" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">분류</label><select id="f-team" class="modal-input" style="margin-bottom:0;" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:25px;"><label id="label-item-type" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">항목</label><select id="f-kpi" class="modal-input" style="margin-bottom:0; border:1px solid var(--accent); font-weight:700; color:var(--accent2);"></select></div>
      <div style="margin-bottom:25px;"><label id="label-last" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">실적</label><textarea id="f-last" class="modal-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div style="margin-bottom:25px;"><label id="label-this" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">계획</label><textarea id="f-this" class="modal-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:12px;"><button class="btn-reg" style="flex:2; padding:18px; font-size:14px; font-weight:900;" onclick="saveData()">SAVE CHANGES</button><button id="del-btn" class="btn-reg" style="flex:1; background:var(--red); font-weight:900;" onclick="deleteData()">DELETE</button></div>
      <div id="lock-msg" style="display:none; color:var(--red); font-size:13px; font-weight:700; text-align:center;">마감된 월은 수정이 불가합니다.</div>
    </div>
  </div>
</div>

<script>
function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === 'kpia' && p === 'kpia123!') {
    sessionStorage.setItem('k_uid', i);
    sessionStorage.setItem('k_token_vfinal', btoa(Date.now()));
    checkAuth();
  } else {
    alert("인증 실패: 정보를 다시 확인하세요.");
  }
}

function checkAuth() {
  if (sessionStorage.getItem('k_token_vfinal')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateDateDisplays();
    render();
  }
}

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_TEAMS = ['기획홍보팀', '대외정책팀', '차트운영팀', '개발파트'];
const KPI_DATA_FULL = {
  '기획홍보팀': [{ item:'신규 사업 개발' }, { item:'협회 언론 대응' }, { item:'최소 보도량 달성률' }, { item:'MWM 콘퍼런스' }, { item:'써클차트 브랜딩' }],
  '대외정책팀': [{ item:'정책파트너십 강화' }, { item:'이슈 공론화' }, { item:'법안 입법관리' }, { item:'정책 아이템 개발' }],
  '차트운영팀': [{ item:'클린 데이터 선행관리' }, { item:'운영 효율화' }, { item:'브랜딩' }, { item:'파트너십 수익 증대' }],
  '개발파트': [{ item:'시스템 안정 운영' }, { item:'시스템 개선' }, { item:'시스템 클라우드 이전' }, { item:'정산분배 시스템 런칭' }]
};

const TASK_TEAMS = ['음악산업 지원확대', '입법 대응', '정책 기능 강화', '회원사 권익보호', '회원사 지원교류', '저작권 투명성 IT', '협회 자체 사업', '압도적 투명성 운영'];
const TASK_DATA_FULL = {
  '음악산업 지원확대': [
    { item:'정부의 대중음악 전담 조직 추진', owner:'우승현, 최태영' },
    { item:'K-뮤직 펀드 조성 추진', owner:'우승현, 전종봉' },
    { item:'음악관련 예산 증대 및 아이템 발굴', owner:'임숙형, 전종봉' },
    { item:'음반·MD 수출 관련 지원 정책 개발', owner:'우승현, 김창규' }
  ],
  '입법 대응': [
    { item:'대중법 일부개정 등 규제 강화 대응', owner:'최태영, 전종봉' },
    { item:'안무저작권 표준계약서 제정 지원', owner:'최태영, 전종봉' },
    { item:'음악산업 제작비 세액 공제 적용 추진', owner:'최태영, 전종봉' },
    { item:'AI 저작권 관련 업계 가이드 및 대응', owner:'최태영, 김창규' }
  ],
  '정책 기능 강화': [
    { item:'협회 내 정책연구소 설립 추진', owner:'우승현, 최태영' },
    { item:'MWM 콘퍼런스 개선 진행', owner:'임숙형' },
    { item:'국회 정책제안 포럼 개최', owner:'최태영, 전종봉' }
  ],
  '회원사 권익보호': [
    { item:'근로시간 52시간 유연 적용 추진', owner:'최태영, 김창규' },
    { item:'전송서비스 사용료 징수규정 개정 대응', owner:'최태영, 김창규' },
    { item:'숏폼콘텐츠 사용료 징수규정 개정 대응', owner:'최태영, 김창규' },
    { item:'시상식 가이드라인 제정_발효', owner:'최태영, 전종봉' },
    { item:'음반 제작∙판매에 대한 조세특례 추진', owner:'최태영, 전종봉' }
  ],
  '회원사 지원교류': [
    { item:'대중음악 특성 인력 양성', owner:'최태영, 전종봉' },
    { item:'음악산업 리브랜딩 전략 수립', owner:'임숙형' },
    { item:'업계와 회원사를 위한 사업 활동 기획', owner:'임숙형' },
    { item:'건강검진 단체계약', owner:'지원파트' }
  ],
  '저작권 투명성 IT': [
    { item:'방송 사용음악 모니터링 시스템 운영', owner:'최태영, 김창규' },
    { item:'음원-권리정보 통합DB 운영', owner:'최태영, 김창규' },
    { item:'라이브러리음악 UCI 발급시스템',owner:'최태영, 김창규' },
    { item:'K-팝 음원코드 체계 정비', owner:'최태영, 김창규' }
  ],
  '협회 자체 사업': [
    { item:'써클차트 운영', owner:'정다운' },
    { item:'K-팝 번역지원서비스 지원사업', owner:'정다운' }
  ],
  '압도적 투명성 운영': [
    { item:'감사제도 도입 및 내부 회계 제도 정비', owner:'우승현, 이충근' },
    { item:'회계 컨설팅 진행 및 외감/세무기장', owner:'이충근, 최지원' }
  ]
};

let currentYear = 2026, currentMonth = new Date().getMonth();
let currentView = 'tracking', currentCategory = 'kpi', currentHistoryTeam = KPI_TEAMS[0];
let db = JSON.parse(localStorage.getItem('k_total_db_v6') || '[]');
let logs = JSON.parse(localStorage.getItem('k_total_logs_v6') || '[]');

const rNow = new Date(), rY = rNow.getFullYear(), rM = rNow.getMonth();

function toggleNavGroup(id) { document.getElementById(id).classList.toggle('closed'); }

function addHistoryLog(action, category, team, item, details) {
  const now = new Date(), uid = sessionStorage.getItem('k_uid') || 'Admin';
  const time = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.unshift({ time, action, category: category.toUpperCase(), team, item, details, user: uid });
  localStorage.setItem('k_total_logs_v6', JSON.stringify(logs));
}

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'), mg = document.getElementById('month-grid');
  yg.innerHTML = ""; mg.innerHTML = "";
  for(let y=2024; y<=2030; y++) {
    const d = document.createElement('div'); d.className=`grid-item ${y===currentYear?'active':''}`; d.textContent=y+"년";
    d.onclick=(e)=>{e.stopPropagation();currentYear=y;updateDateDisplays();render();}; yg.appendChild(d);
  }
  mg.innerHTML = MONTHS.map((m,i)=>`<div class="grid-item ${i===currentMonth?'active':''}" onclick="event.stopPropagation();currentMonth=${i};updateDateDisplays();render();">${m}</div>`).join('');
}

function showView(view, category) {
  currentView = view; currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS[0] : TASK_TEAMS[0]);
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById(`m-${category}-${view}`); if(btn) btn.classList.add('active');
  const prefix = category === 'kpi' ? '[KPI]' : '[주요업무]';
  const titles = { 'tracking':'월별 트래킹', 'history':'연간 누적 현황', 'kpilist':'KPI 전체보기', 'logs':'변경 로그' };
  document.getElementById('page-title').innerHTML = `${prefix} ${titles[view]}`;
  document.getElementById('date-controls').style.display = (view === 'tracking') ? 'flex' : 'none';
  render();
}

function render() {
  const container = document.getElementById('main-content');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  const dataList = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  const isPast = (currentYear < rY) || (currentYear === rY && currentMonth < rM);

  if (currentView === 'logs') {
    const filtered = logs.filter(l => l.category === currentCategory.toUpperCase());
    container.innerHTML = filtered.length > 0 ? filtered.map(l => `
      <div class="log-item"><div class="log-header"><div><span class="log-tag tag-${l.action}">${l.action}</span> <span style="color:var(--text3); font-size:11px; margin-left:10px;">${l.time}</span></div><span class="log-user">UID: ${l.user}</span></div>
      <div style="font-weight:800; font-size:14px; margin: 10px 0; color:var(--text);">${l.team} - ${l.item}</div><div class="log-detail-box">${l.details}</div></div>`).join('') : '<div style="text-align:center; padding:100px; color:var(--text3);">기록이 없습니다.</div>';
    return;
  }

  /* KPI 전체보기 (지표 가이드 + 가중치) 렌더링 */
  if (currentView === 'kpilist') {
    const kpiGuideData = [
        { team: '기획홍보팀', item: '신규 사업 개발', weight: '20%', guide: '협회 수익 다각화를 위한 신규 비즈니스 모델 발굴 및 런칭 건수' },
        { team: '기획홍보팀', item: '협회 언론 대응', weight: '20%', guide: '주요 이슈 발생 시 협회 입장 대변 및 보도자료 배포, 위기 관리' },
        { team: '기획홍보팀', item: '최소 보도량 달성률', weight: '20%', guide: '정기 보도자료 및 기획 기사 노출 목표 수치 대비 달성도' },
        { team: '기획홍보팀', item: 'MWM 콘퍼런스', weight: '20%', guide: '콘퍼런스 기획, 연사 섭외, 홍보 및 행사 운영 전반의 성과' },
        { team: '기획홍보팀', item: '써클차트 브랜딩', weight: '20%', guide: '차트 인지도 제고를 위한 마케팅 캠페인 및 대외 홍보 활동' },
        
        { team: '대외정책팀', item: '정책파트너십 강화', weight: '25%', guide: '유관 기관, 국회, 정부 부처와의 네트워크 구축 및 협력 체계 유지' },
        { team: '대외정책팀', item: '이슈 공론화', weight: '25%', guide: '산업 내 주요 현안에 대한 세미나, 포럼 개최 및 여론 형성' },
        { team: '대외정책팀', item: '법안 입법관리', weight: '25%', guide: '음악산업 관련 법안 발의 현황 모니터링 및 대응 논리 개발' },
        { team: '대외정책팀', item: '정책 아이템 개발', weight: '25%', guide: '산업 발전을 위한 신규 정책 제안서 작성 및 제도 개선 요구' },

        { team: '차트운영팀', item: '클린 데이터 선행관리', weight: '30%', guide: '차트 데이터 검증 프로세스 강화 및 어뷰징 차단 데이터 무결성 확보' },
        { team: '차트운영팀', item: '운영 효율화', weight: '20%', guide: '데이터 집계 및 정산 프로세스 자동화 등을 통한 업무 리소스 절감' },
        { team: '차트운영팀', item: '브랜딩', weight: '20%', guide: '차트 리포트 발간 및 데이터 기반 인사이트 제공을 통한 전문성 강화' },
        { team: '차트운영팀', item: '파트너십 수익 증대', weight: '30%', guide: '국내외 플랫폼 데이터 공급 계약 체결 및 수수료 수익 관리' },

        { team: '개발파트', item: '시스템 안정 운영', weight: '30%', guide: '서버 가동률 99.9% 유지 및 장애 발생 시 즉각 대응/복구' },
        { team: '개발파트', item: '시스템 개선', weight: '20%', guide: '기존 내부 시스템 기능 고도화 및 사용자 UI/UX 편의성 향상' },
        { team: '개발파트', item: '시스템 클라우드 이전', weight: '20%', guide: '인프라 비용 최적화 및 확장성을 위한 클라우드 마이그레이션 추진' },
        { team: '개발파트', item: '정산분배 시스템 런칭', weight: '30%', guide: '정확한 정산을 위한 신규 시스템 설계, 개발 및 안정화' }
    ];

    let guideHtml = `
    <div class="panel" style="max-width: 1000px; margin: 0 auto;">
        <div class="panel-header">📋 KPI 지표 정의 및 가중치 (전체보기)</div>
        <div style="padding: 20px; overflow-x: auto;">
            <table class="kpi-table">
                <thead>
                    <tr>
                        <th style="width: 120px;">팀명</th>
                        <th style="width: 180px;">KPI 항목</th>
                        <th style="width: 80px;">가중치</th>
                        <th style="text-align: left;">지표 정의 및 측정 가이드</th>
                    </tr>
                </thead>
                <tbody>
                    ${kpiGuideData.map(row => `
                        <tr>
                            <td style="text-align: center; font-weight: 700; color: var(--accent2);">${row.team}</td>
                            <td style="text-align: center; color: var(--text); font-weight: 600;">${row.item}</td>
                            <td style="text-align: center; color: var(--orange); font-weight: 800;">${row.weight}</td>
                            <td style="text-align: left;">${row.guide}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    </div>`;
    container.innerHTML = guideHtml;
    return;
  }

  if (currentView === 'history') {
    let html = `<div style="max-width: 1100px; margin: 0 auto;"><div class="history-team-grid" style="grid-template-columns: repeat(4, 1fr);">${teams.map(t => `<div class="history-team-btn ${t === currentHistoryTeam ? 'active' : ''}" onclick="currentHistoryTeam='${t}';render();">${t}</div>`).join('')}</div>`;
    for(let m = 0; m < 12; m++) {
      const hData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === m && d.team === currentHistoryTeam);
      if(hData.length > 0) {
        html += `<div style="border-left:3px solid var(--orange); padding-left:25px; margin-bottom:40px;"><h3 style="color:var(--orange); margin-bottom:20px; font-size:18px; font-weight:900;">${MONTHS[m]} <span class="month-badge">RECORD</span></h3><div class="grid-2">${hData.map(d => `
          <div class="panel"><div class="panel-header" style="border-bottom:none; font-size:13px; color:var(--accent2);">${d.item}</div><div class="panel-body" onclick="${(currentYear < rY || (currentYear === rY && m < rM)) ? '' : `openModal('${d.id}')`}" style="cursor:pointer; padding:0 20px 20px;">
          <div style="margin-bottom:12px;"><div style="font-size:11px; color:var(--green); font-weight:700; margin-bottom:5px;">✓ 실적</div><div style="font-size:13px; line-height:1.6;">${d.lastDone}</div></div>
          <div><div style="font-size:11px; color:var(--accent); font-weight:700; margin-bottom:5px;">→ 계획</div><div style="font-size:13px; line-height:1.6;">${d.thisPlan}</div></div></div></div>`).join('')}</div></div>`;
      }
    }
    container.innerHTML = html + "</div>";
    return;
  }

  let trackingHtml = "";
  if (currentCategory === 'task') {
    trackingHtml += `<div class="shortcut-wrapper"><div class="shortcut-grid">${teams.map((t, i) => `<div class="shortcut-btn" onclick="document.getElementById('sec-${i}').scrollIntoView({behavior:'smooth', block:'center'})">${t}</div>`).join('')}</div></div>`;
  }

  const mData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === currentMonth);
  trackingHtml += `<div class="grid-2">${teams.map((team, idx) => `
    <div class="panel" id="sec-${idx}">
      <div class="panel-header"><span>${team} <span class="month-badge">${MONTHS[currentMonth]}</span></span><button class="btn-reg" onclick="openModal(null, '${team}')">+ 등록</button></div>
      <div class="panel-body">
        ${dataList[team] ? dataList[team].map(k => {
          const entry = mData.find(d => String(d.team) === String(team) && String(d.item) === String(k.item));
          return `<div class="tracking-card ${isPast ? 'locked' : ''}" onclick="${isPast ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}')`}">
            <div style="font-size:13px; font-weight:900; color:var(--accent2); margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:6px;">${k.item} ${k.owner ? `<span style="font-weight:400; font-size:10px; color:var(--text3); float:right;">[${k.owner}]</span>` : ''}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; font-size:12px;">
              <div><span style="color:var(--green); font-weight:700; display:block; margin-bottom:4px;">${currentMonth === 0 ? '12월' : currentMonth + '월'} 실적:</span>${entry?entry.lastDone:'-'}</div>
              <div><span style="color:var(--accent); font-weight:700; display:block; margin-bottom:4px;">${MONTHS[currentMonth]} 계획:</span>${entry?entry.thisPlan:'-'}</div>
            </div></div>`;
        }).join('') : ''}
      </div></div>`).join('')}</div>`;
  
  container.innerHTML = trackingHtml;
}

function openModal(id = null, teamHint = null, itemHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  const footer = document.getElementById('modal-footer'), lockMsg = document.getElementById('lock-msg');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('label-team-type').textContent = (currentCategory === 'kpi' ? '팀명' : '분류');
  document.getElementById('label-item-type').textContent = (currentCategory === 'kpi' ? '항목' : '세부 업무');
  if (id && id !== '') {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = currentMonth; fTeam.value = teamHint || teams[0];
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  const isLocked = (currentYear < rY) || (currentYear === rY && parseInt(fMonth.value) < rM);
  footer.style.display = isLocked ? 'none' : 'flex'; lockMsg.style.display = isLocked ? 'block' : 'none';
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() { const m = parseInt(document.getElementById('f-month').value); document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 실적`; document.getElementById('label-this').innerHTML = `${MONTHS[m]} 계획`; }
function updateKpiOptions() { const t = document.getElementById('f-team').value; const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL); document.getElementById('f-kpi').innerHTML = list[t] ? list[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('') : ''; }

function saveData() {
  const id = document.getElementById('f-id').value, team = document.getElementById('f-team').value, item = document.getElementById('f-kpi').value;
  const last = document.getElementById('f-last').value, plan = document.getElementById('f-this').value, m = parseInt(document.getElementById('f-month').value);
  const old = db.find(x => String(x.id) === String(id));
  if (old) {
    let diff = "";
    if(old.lastDone !== last) diff += `<span class="log-diff-label">[실적 변경]</span> ${old.lastDone} → ${last}\n`;
    if(old.thisPlan !== plan) diff += `<span class="log-diff-label">[계획 변경]</span> ${old.thisPlan} → ${plan}`;
    addHistoryLog('수정', currentCategory, team, item, diff || "내용 변경 없음");
  } else { addHistoryLog('등록', currentCategory, team, item, `[초기 실적] ${last}\n[초기 계획] ${plan}`); }
  const entry = { id: id || Date.now(), type: currentCategory, year: currentYear, month: m, team, item, lastDone: last, thisPlan: plan };
  db = db.filter(d => String(d.id) !== String(entry.id)); db.push(entry);
  localStorage.setItem('k_total_db_v6', JSON.stringify(db)); currentMonth = m; updateDateDisplays(); closeModal(); render();
}

function deleteData() {
  const id = document.getElementById('f-id').value, d = db.find(x => String(x.id) === String(id));
  if(confirm('삭제하시겠습니까?')) {
    addHistoryLog('삭제', currentCategory, d.team, d.item, `[삭제] 실적: ${d.lastDone} / 계획: ${d.thisPlan}`);
    db = db.filter(x => String(x.id) !== String(id)); localStorage.setItem('k_total_db_v6', JSON.stringify(db));
    closeModal(); render();
  }
}

function exportToExcel() {
  let csv = "Category,Year,Month,Team,Item,Result,Plan\n";
  db.sort((a,b)=>a.month-b.month).forEach(d => { csv += `${d.type.toUpperCase()},${d.year},${d.month+1},${d.team},"${d.item}","${d.lastDone.replace(/"/g,'""')}","${d.thisPlan.replace(/"/g,'""')}"\n`; });
  const b = new Blob(["\ufeff"+csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `KPIA_MGMT_DB.csv`; a.click();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleLogout() { sessionStorage.clear(); location.reload(); }
function togglePopup(e, id) { e.stopPropagation(); const target = document.getElementById(id); const isVisible = target.style.display === 'grid'; document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); target.style.display = isVisible ? 'none' : 'grid'; }
function closeAllPopups(e) { if (!e.target.closest('.date-selectors')) document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }

window.onload = checkAuth;
</script>
