<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 통합 성과 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.08);
  --text: #e8eaf0; --text2: #a1a8b5; --text3: #636b7f;
  --accent: #5b7cff; --accent-light: rgba(91,124,255,0.15);
  --orange: #ff6b00; --orange-light: rgba(255,107,0,0.15);
  --green: #22c55e; --red: #ef4444;
  --topbar-h: 70px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

/* 무왜곡 정밀 SVG 로고 */
.kpia-logo-svg { width: 110px; height: auto; display: block; margin: 0 auto 15px; overflow: visible; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1.8px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

/* 사이드바 */
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.logo-section { padding: 35px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 9px; font-weight: 800; color: var(--text3); letter-spacing: 2px; margin-top: 8px; }

.nav { padding: 15px 0; flex: 1; overflow-y: auto; }
.nav-group { margin-bottom: 5px; }
.nav-group-header { 
  padding: 14px 24px; font-size: 13px; font-weight: 900; color: var(--text3); 
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  background: rgba(255,255,255,0.01); transition: 0.2s;
}
.nav-group-header:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.nav-group.closed .nav-group-content { display: none; }
.nav-group.closed .nav-group-header i { transform: rotate(-90deg); }

.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 30px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 800; }

/* 고정 상단바 */
.main { flex: 1; overflow-y: auto; background: #0a0c10; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
.topbar { 
  height: var(--topbar-h); min-height: var(--topbar-h); padding: 0 40px; border-bottom: 1px solid var(--border); 
  display: grid; grid-template-columns: 1.2fr auto 1.2fr; align-items: center; 
  background: rgba(13, 15, 20, 0.98); backdrop-filter: blur(20px); 
  position: sticky; top: 0; z-index: 1000; 
}
.topbar h2 { font-size: 18px; font-weight: 900; color: #fff; white-space: nowrap; }

/* 중앙 날짜 선택 */
.date-selectors { display: flex; gap: 10px; align-items: center; justify-content: center; }
.grid-trigger { 
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; 
  padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 700; color: #fff;
}

/* ★ 스티키 LNB (퀵 바로가기) ★ */
.lnb-wrapper { 
  position: sticky; top: var(--topbar-h); z-index: 900; 
  padding: 15px 40px; background: rgba(10, 12, 18, 0.95); 
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); 
}
.lnb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
.lnb-item { 
  background: var(--bg3); border: 1px solid var(--border); padding: 10px; border-radius: 10px; 
  font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; color: var(--text2); 
}
.lnb-item:hover { border-color: var(--accent); color: #fff; }

/* 월 배지 */
.month-badge { font-size: 11px; color: var(--accent); font-weight: 800; margin-left: 10px; padding: 2px 8px; background: rgba(91,124,255,0.15); border-radius: 5px; vertical-align: middle; }

/* 패널 및 리스트 */
.content { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
.panel { scroll-margin-top: 150px; background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; margin-bottom: 40px; overflow: hidden; }
.panel-header { padding: 20px 30px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }

.tracking-card { 
  background: var(--bg3); border-radius: 18px; padding: 25px; border: 1px solid transparent; 
  display: grid; grid-template-columns: 240px 1fr; gap: 30px; align-items: center; transition: 0.2s; margin: 15px 25px; cursor: pointer;
}
.tracking-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.data-row { display: grid; grid-template-columns: 110px 1fr; margin-bottom: 8px; }
.data-label { font-size: 11px; font-weight: 900; color: var(--text3); }
.data-val { font-size: 14px; color: var(--text2); line-height: 1.6; }

/* 로그 강화 */
.log-card { background: var(--bg3); border-radius: 16px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--text3); border: 1px solid var(--border); }
.log-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.log-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
.tag-등록 { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-수정 { background: rgba(91,124,255,0.15); color: var(--accent); }
.tag-삭제 { background: rgba(239,68,68,0.15); color: var(--red); }
.log-body { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; white-space: pre-wrap; font-size: 13px; line-height: 1.8; color: var(--text2); }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(8px); }
.modal { background: var(--bg2); width: 660px; border-radius: 32px; border: 1px solid var(--border); overflow: hidden; }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); margin-bottom: 15px; outline: none; }
.btn-reg { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }

.selector-grid-popup { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 1100; width: 300px; }
.grid-item { padding: 12px; text-align: center; border-radius: 10px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
    <div style="font-size:15px; font-weight:900; margin-bottom:30px; color:var(--text3);">INTEGRATED SYSTEM</div>

</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
        <div class="logo-sub">PERFORMANCE & TASKS</div>
      </div>
      <div class="nav">
        <div class="nav-group" id="group-kpi">
          <div class="nav-group-header" onclick="toggleNavGroup('group-kpi')"><span>KPI 성과 관리</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-kpi-tracking" class="nav-item active" onclick="showView('tracking', 'kpi')">📊 월별 트래킹</div>
            <div id="m-kpi-history" class="nav-item" onclick="showView('history', 'kpi')">📅 연간 누적 현황</div>
            <div id="m-kpi-logs" class="nav-item" onclick="showView('logs', 'kpi')">📜 변경 로그</div>
          </div>
        </div>
        <div class="nav-group" id="group-task">
          <div class="nav-group-header" onclick="toggleNavGroup('group-task')"><span>연간 주요 업무</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-task-tracking" class="nav-item" onclick="showView('tracking', 'task')">📊 월별 트래킹</div>
            <div id="m-task-history" class="nav-item" onclick="showView('history', 'task')">📅 연간 누적 현황</div>
            <div id="m-task-logs" class="nav-item" onclick="showView('logs', 'task')">📜 변경 로그</div>
          </div>
        </div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 30px; color: var(--red); opacity: 0.8; font-weight: 800;">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main" id="scroll-area">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors">
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div><div id="year-grid" class="selector-grid-popup"></div></div>
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div><div id="month-grid" class="selector-grid-popup"></div></div>
        </div>
        <button class="btn-reg" style="justify-self: end; font-size:12px;" onclick="exportToExcel()">📊 EXCEL EXPORT</button>
      </div>
      <div id="lnb-area"></div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:25px 35px;"><h3 id="modal-title">데이터 기록</h3><button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:24px;">✕</button></div>
    <div class="modal-body" style="padding:35px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div><label style="display:block; font-size:12px; color:var(--text3); margin-bottom:8px; font-weight:800;">대상 월</label><select id="f-month" class="modal-input" onchange="updateModalLabels()"></select></div>
        <div><label id="label-team-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:8px; font-weight:800;">분류</label><select id="f-team" class="modal-input" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:15px;"><label id="label-item-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:8px; font-weight:800;">항목</label><select id="f-kpi" class="modal-input"></select></div>
      <div style="margin-bottom:15px;"><label id="label-last" style="display:block; font-size:12px; color:var(--green); margin-bottom:8px; font-weight:800;">실적</label><textarea id="f-last" class="modal-input" style="height:110px;"></textarea></div>
      <div style="margin-bottom:20px;"><label id="label-this" style="display:block; font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:800;">계획</label><textarea id="f-this" class="modal-input" style="height:110px;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:12px;"><button class="btn-reg" style="flex:2; padding:18px; font-size:14px;" onclick="saveData()">저장하기</button><button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">삭제</button></div>
    </div>
  </div>
</div>

<script>
/** 1. 인증 및 로그인 (kpia_kpi / kpi2026!) **/
const _0xV1 = [108, 119, 110, 102, 88, 108, 119, 110]; // kpia_kpi
const _0xV2 = [108, 119, 110, 53, 55, 53, 49, 38]; // kpi2026!
const _0xM = (a) => a.map(v => String.fromCharCode(v ^ 0x07)).join('');

function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === _0xM(_0xV1) && p === _0xM(_0xV2)) {
    sessionStorage.setItem('k_uid', i); sessionStorage.setItem('k_auth_v7', btoa(Date.now())); checkAuth();
  } else { alert("아이디 혹은 비밀번호가 틀립니다."); }
}
function checkAuth() { if (sessionStorage.getItem('k_auth_v7')) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; updateDateDisplays(); render(); } }

/** 2. 데이터 정의 **/
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_TEAMS = ['기획홍보팀', '대외정책팀', '차트운영팀', '개발파트'];
const KPI_DATA_FULL = {
  '기획홍보팀': [{ item:'신규 사업 개발' }, { item:'협회 언론 대응' }, { item:'최소 보도량 달성률' }, { item:'MWM 콘퍼런스' }, { item:'써클차트 브랜딩' }],
  '대외정책팀': [{ item:'정책파트너십 강화' }, { item:'이슈 공론화' }, { item:'법안 입법관리' }, { item:'정책 아이템 개발' }],
  '차트운영팀': [{ item:'클린 데이터 선행관리' }, { item:'운영 효율화' }, { item:'브랜딩' }, { item:'파트너십 수익 증대' }],
  '개발파트': [{ item:'시스템 안정 운영' }, { item:'시스템 개선' }, { item:'시스템 클라우드 이전' }, { item:'정산분배 시스템 런칭' }]
};

const TASK_TEAMS = ['음악산업 지원확대', '입법 대응', '정책 기능 강화', '회원사 권익보호', '회원사 지원교류', '저작권 투명성 IT', '협회 운영 및 자체사업'];
const TASK_DATA_FULL = {
  '음악산업 지원확대': [{ item:'정부의 대중음악 전담 조직 추진', owner:'우승현, 최태영' }, { item:'K-뮤직 펀드 조성 추진', owner:'우승현, 전종봉' }, { item:'음악관련 예산 증대 및 아이템 발굴', owner:'임숙형, 전종봉' }, { item:'음반·MD 수출 관련 지원 정책 개발', owner:'우승현, 김창규' }],
  '입법 대응': [{ item:'대중법 일부개정 등 규제 강화 대응', owner:'최태영, 전종봉' }, { item:'안무저작권 표준계약서 제정 지원', owner:'최태영, 전종봉' }, { item:'음악산업 제작비 세액 공제 적용 추진', owner:'최태영, 전종봉' }, { item:'AI 저작권 관련 업계 가이드 및 대응', owner:'최태영, 김창규' }],
  '정책 기능 강화': [{ item:'협회 내 정책연구소 설립 추진', owner:'우승현, 최태영' }, { item:'MWM 콘퍼런스 품질 및 만족도 개선', owner:'임숙형' }, { item:'국회 정책제안 포럼 정례 개최', owner:'최태영, 전종봉' }],
  '회원사 권익보호': [{ item:'근로시간 52시간 유연 적용 정책 대응', owner:'최태영, 전종봉' }, { item:'전송서비스 사용료 징수규정 개정 대응', owner:'최태영, 김창규' }, { item:'숏폼콘텐츠 사용료 징수규정 개정 대응', owner:'최태영, 김창규' }, { item:'시상식 가이드라인 제정 및 발효', owner:'최태영, 전종봉' }, { item:'음반 제작∙판매 조세특례 추진', owner:'최태영, 전종봉' }],
  '회원사 지원교류': [{ item:'대중음악 특성 인력 양성', owner:'최태영, 전종봉' }, { item:'음악산업 리브랜딩 전략 수립', owner:'임숙형' }, { item:'업계 및 회원사 사업 활동 기획', owner:'임숙형' }, { item:'회원사 건강검진 단체계약 지원', owner:'전종봉' }],
  '저작권 투명성 IT': [{ item:'방송 사용음악 모니터링 시스템 운영', owner:'최태영, 김창규' }, { item:'음원-권리정보 통합DB 관리 고도화', owner:'최태영, 김창규' }, { item:'라이브러리음악 UCI 발급시스템 운영', owner:'최태영, 김창규' }, { item:'K-팝 음원코드 체계 정비 추진', owner:'최태영, 김창규' }],
  '협회 운영 및 자체사업': [{ item:'써클차트 운영 및 고도화', owner:'정다운, 우승현' }, { item:'K-팝 번역지원서비스 지원사업 운영', owner:'정다운' }, { item:'감사제도 도입 및 내부 회계 정비', owner:'우승현, 이충근' }, { item:'회계 컨설팅 및 외감/세무기장 관리', owner:'이충근, 최지원' }, { item:'사무국 조직 효율화 및 성과 관리', owner:'우승현' }],
  '압도적 투명성 운영': [ { item:'감사제도 도입 및 내부 회계 제도 정비', owner:'우승현, 이충근' }, { item:'회계 컨설팅 진행 및 외감/세무기장', owner:'이충근, 최지원' }],
  ]
};

let currentYear = 2026, currentMonth = new Date().getMonth();
let currentView = 'tracking', currentCategory = 'kpi', currentHistoryTeam = KPI_TEAMS[0];
let db = JSON.parse(localStorage.getItem('k_combined_db_v7') || '[]');
let logs = JSON.parse(localStorage.getItem('k_combined_logs_v7') || '[]');

const rNow = new Date(), rY = rNow.getFullYear(), rM = rNow.getMonth();

/** 3. 핵심 로직 **/
function toggleNavGroup(id) { document.getElementById(id).classList.toggle('closed'); }

function showView(view, category) {
  currentView = view; currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS : TASK_TEAMS)[0];
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById(`m-${category}-${view}`); if(btn) btn.classList.add('active');
  const titles = { 'tracking':'월별 트래킹', 'history':'연간 누적 현황', 'logs':'변경 로그' };
  document.getElementById('page-title').innerHTML = `[${category.toUpperCase()}] ${titles[view]}`;
  render();
}

function render() {
  if (!sessionStorage.getItem('k_auth_v7')) return;
  const container = document.getElementById('main-content');
  const lnbArea = document.getElementById('lnb-area');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  const dataList = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  lnbArea.innerHTML = "";

  if (currentView === 'logs') {
    const filtered = logs.filter(l => l.category === currentCategory.toUpperCase());
    container.innerHTML = filtered.length > 0 ? filtered.map(l => `
      <div class="log-card"><div class="log-header"><div><span class="log-tag tag-${l.action}">${l.action}</span> <span style="color:var(--text3); font-size:11px; margin-left:10px;">${l.time}</span></div><span style="font-size:11px; color:var(--accent);">UID: ${l.user}</span></div>
      <div style="font-weight:800; font-size:14px; margin-bottom:10px;">${l.team} - ${l.item}</div><div class="log-body">${l.details}</div></div>`).join('') : '<div style="text-align:center; padding:100px; color:var(--text3);">기록이 없습니다.</div>';
    return;
  }

  if (currentView === 'history') {
    lnbArea.innerHTML = `<div class="lnb-wrapper"><div class="lnb-grid">${teams.map(t => `<div class="lnb-item ${t === currentHistoryTeam ? 'active' : ''}" onclick="currentHistoryTeam='${t}';render();">${t}</div>`).join('')}</div></div>`;
    let html = `<div style="max-width: 1100px; margin: 0 auto;">`;
    for(let m = 0; m < 12; m++) {
      const hData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === m && d.team === currentHistoryTeam);
      if(hData.length > 0) {
        html += `<div style="border-left:3px solid var(--orange); padding-left:25px; margin-bottom:40px;"><h3 style="color:var(--orange); font-size:18px; font-weight:900; margin-bottom:20px;">${MONTHS[m]} <span class="month-badge">RECORD</span></h3><div class="grid-2">${hData.map(d => `
          <div class="panel"><div class="panel-header" style="border-bottom:none; font-size:13px; color:var(--accent2);">${d.item}</div><div class="panel-body" onclick="openModal('${d.id}')" style="cursor:pointer; padding:0 20px 20px;">
          <div class="data-row"><div class="data-label" style="color:var(--green);">✓ 실적</div><div class="data-val">${d.lastDone}</div></div>
          <div class="data-row"><div class="data-label" style="color:var(--accent);">→ 계획</div><div class="data-val">${d.thisPlan}</div></div></div></div>`).join('')}</div></div>`;
      }
    }
    container.innerHTML = html + "</div>";
    return;
  }

  // 트래킹 뷰 (바로가기 LNB 포함)
  if (currentView === 'tracking') {
    lnbArea.innerHTML = `<div class="lnb-wrapper"><div class="lnb-grid">${teams.map((t,i) => `<div class="lnb-item" onclick="document.getElementById('sec-${i}').scrollIntoView({behavior:'smooth', block:'center'})">${t}</div>`).join('')}</div></div>`;
    const mData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === currentMonth);
    container.innerHTML = teams.map((team, idx) => `
      <div class="panel" id="sec-${idx}" style="border-top: 3px solid var(--color-${team} || var(--accent));">
        <div class="panel-header"><span>${team} <span class="month-badge">${MONTHS[currentMonth]}</span></span><button class="btn-reg" onclick="openModal(null, '${team}')">+ 등록</button></div>
        <div class="panel-body">
          ${dataList[team].map(k => {
            const entry = mData.find(d => d.team === team && d.item === k.item);
            return `<div class="tracking-card" onclick="openModal('${entry?entry.id:''}','${team}','${k.item}')">
              <div><div style="font-weight:900; color:#fff; font-size:14px; margin-bottom:6px;">${k.item}</div>${k.owner ? `<div style="font-size:10px; color:var(--text3);">담당: ${k.owner}</div>` : ''}</div>
              <div>
                <div class="data-row"><div class="data-label" style="color:var(--green);">[실적]</div><div class="data-val">${entry ? entry.lastDone : '-'}</div></div>
                <div class="data-row"><div class="data-label" style="color:var(--accent);">[계획]</div><div class="data-val">${entry ? entry.thisPlan : '-'}</div></div>
              </div></div>`;
          }).join('')}
        </div></div>`).join('');
  }
}

function openModal(id = null, teamHint = null, itemHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('label-team-type').textContent = (currentCategory === 'kpi' ? '팀명' : '분류');
  document.getElementById('label-item-type').textContent = (currentCategory === 'kpi' ? '연계 KPI 항목' : '업무 항목');
  if (id) {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = currentMonth; fTeam.value = teamHint || teams[0];
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() { const m = parseInt(document.getElementById('f-month').value); document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 실적`; document.getElementById('label-this').innerHTML = `${MONTHS[m]} 계획`; }
function updateKpiOptions() { const t = document.getElementById('f-team').value; const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL); document.getElementById('f-kpi').innerHTML = (list[t]||[]).map(k => `<option value="${k.item}">${k.item}</option>`).join(''); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveData() {
  const id = document.getElementById('f-id').value, team = document.getElementById('f-team').value, item = document.getElementById('f-kpi').value;
  const last = document.getElementById('f-last').value, plan = document.getElementById('f-this').value, m = parseInt(document.getElementById('f-month').value);
  const old = db.find(x => String(x.id) === String(id));
  if (old) {
    let diff = "";
    if(old.lastDone !== last) diff += `<span style="color:var(--orange)">[실적 변경]</span> ${old.lastDone} → ${last}\n`;
    if(old.thisPlan !== plan) diff += `<span style="color:var(--orange)">[계획 변경]</span> ${old.thisPlan} → ${plan}`;
    addHistoryLog('수정', currentCategory, team, item, diff || "변경사항 없음");
  } else { addHistoryLog('등록', currentCategory, team, item, `[초기 내용]\n실적: ${last}\n계획: ${plan}`); }
  const entry = { id: id || Date.now(), type: currentCategory, year: currentYear, month: m, team, item, lastDone: last, thisPlan: plan };
  db = db.filter(d => String(d.id) !== String(entry.id)); db.push(entry);
  localStorage.setItem('k_combined_db_v7', JSON.stringify(db)); closeModal(); render();
}

function deleteData() {
  const id = document.getElementById('f-id').value, d = db.find(x => String(x.id) === String(id));
  if(confirm('삭제하시겠습니까?')) {
    addHistoryLog('삭제', currentCategory, d.team, d.item, `[삭제된 데이터] 실적: ${d.lastDone} / 계획: ${d.thisPlan}`);
    db = db.filter(x => String(x.id) !== String(id)); localStorage.setItem('k_combined_db_v7', JSON.stringify(db));
    closeModal(); render();
  }
}

function addHistoryLog(action, category, team, item, details) {
  const now = new Date(), uid = sessionStorage.getItem('k_uid') || 'Admin';
  const time = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.unshift({ time, action, category: category.toUpperCase(), team, item, details, user: uid });
  localStorage.setItem('k_combined_logs_v7', JSON.stringify(logs));
}

function exportToExcel() {
  let csv = "Category,Year,Month,Team,Item,Result,Plan\n";
  db.sort((a,b)=>a.month-b.month).forEach(d => { csv += `${d.type.toUpperCase()},${d.year},${d.month+1},${d.team},"${d.item}","${d.lastDone.replace(/"/g,'""')}","${d.thisPlan.replace(/"/g,'""')}"\n`; });
  const b = new Blob(["\ufeff"+csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `KPIA_MGMT_EXPORT.csv`; a.click();
}

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'), mg = document.getElementById('month-grid');
  yg.innerHTML = ""; mg.innerHTML = "";
  [2024,2025,2026,2027].forEach(y => yg.innerHTML += `<div class="grid-item ${y===currentYear?'active':''}" onclick="currentYear=${y};updateDateDisplays();render();">${y}년</div>`);
  MONTHS.forEach((m,i) => mg.innerHTML += `<div class="grid-item ${i===currentMonth?'active':''}" onclick="currentMonth=${i};updateDateDisplays();render();">${m}</div>`);
}

function togglePopup(e, id) { e.stopPropagation(); const target = document.getElementById(id); const isVisible = target.style.display === 'grid'; document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); target.style.display = isVisible ? 'none' : 'grid'; }
function closeAllPopups() { document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }
function handleLogout() { sessionStorage.clear(); location.reload(); }

window.onload = checkAuth;
</script>
</body>
</html>
