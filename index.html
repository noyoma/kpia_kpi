<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 성과 및 업무 통합 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.08);
  --text: #e8eaf0; --text2: #a1a8b5; --text3: #636b7f;
  --accent: #5b7cff; --accent-light: rgba(91,124,255,0.15);
  --orange: #ff6b00; --orange-light: rgba(255,107,0,0.15);
  --green: #22c55e; --red: #ef4444;
  --code-bg: #0a0c12;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 화면 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

.kpia-logo-svg { width: 110px; height: auto; display: block; margin: 0 auto 15px; overflow: visible; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1.8px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

/* 사이드바 */
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.logo-section { padding: 40px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: 2px; margin-top: 10px; }

.nav { padding: 15px 0; flex: 1; overflow-y: auto; }
.nav-group { margin-bottom: 5px; }
.nav-group-header { padding: 16px 24px; font-size: 13px; font-weight: 800; color: var(--text3); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
.nav-group-header:hover { color: var(--text); }
.nav-group-header i { font-style: normal; font-size: 10px; transition: 0.3s; }
.nav-group.closed .nav-group-content { display: none; }
.nav-group.closed .nav-group-header i { transform: rotate(-90deg); }

.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 30px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; margin: 2px 10px; border-radius: 12px; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 800; }

/* 메인 영역 */
.main { flex: 1; overflow-y: auto; background: #0a0c10; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
.topbar { padding: 20px 40px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: rgba(13,15,20,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
.topbar h2 { font-size: 20px; font-weight: 900; color: #fff; }

.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

/* 콘텐츠 배치 */
.content { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }

/* 패널 디자인 */
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
.panel-header { padding: 22px 28px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }

/* 월별 트래킹 카드 */
.tracking-card { background: var(--bg3); border-radius: 16px; padding: 24px; margin: 15px 20px; border: 1px solid transparent; transition: 0.3s; position: relative; }
.tracking-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
.card-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
.card-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.data-box { padding: 12px 15px; background: rgba(0,0,0,0.2); border-radius: 12px; }
.data-label { font-size: 11px; font-weight: 700; margin-bottom: 8px; display: block; }
.data-value { font-size: 13px; line-height: 1.6; color: var(--text2); min-height: 40px; }

/* 상단 숏컷/필터 그리드 */
.shortcut-wrapper { margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); }
.shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.shortcut-btn { padding: 14px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); border-radius: 10px; font-size: 12px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.shortcut-btn:hover { border-color: var(--accent); color: var(--text); background: var(--bg3); }
.shortcut-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px rgba(91,124,255,0.3); }

/* 변경 로그 - 터미널 코드 스타일 */
.log-terminal { background: var(--code-bg); border-radius: 16px; border: 1px solid var(--border); padding: 25px; font-family: 'Fira Code', monospace; box-shadow: inset 0 0 30px rgba(0,0,0,0.6); }
.log-line { display: flex; gap: 18px; padding: 8px 12px; border-radius: 6px; font-size: 11.5px; line-height: 1.6; border-bottom: 1px solid rgba(255,255,255,0.02); }
.log-num { color: #3a4150; width: 30px; text-align: right; }
.log-time { color: #5c6370; }
.log-action { font-weight: 700; min-width: 60px; }
.action-등록 { color: var(--green); }
.action-수정 { color: var(--accent); }
.action-삭제 { color: var(--red); }
.log-meta { color: #c678dd; }
.log-msg { color: #abb2bf; flex: 1; }

.btn-reg { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; transition: 0.2s; }
.month-badge { font-size: 11px; color: var(--accent); font-weight: 900; padding: 4px 10px; background: var(--accent-light); border-radius: 6px; }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(8px); }
.modal { background: var(--bg2); width: 680px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text); margin-bottom: 20px; outline: none; font-family: inherit; }

.selector-grid-popup { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 1000; width: 300px; }
.grid-item { padding: 12px; text-align: center; border-radius: 10px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
    <div style="font-size:14px; font-weight:800; margin-bottom:30px; color:var(--text3); letter-spacing: 2px;">MANAGEMENT SYSTEM</div>
    <input type="text" id="login-id" class="modal-input" placeholder="ID (kpia)">
    <input type="password" id="login-pw" class="modal-input" placeholder="PASSWORD (kpia123!)">
    <button class="btn-reg" style="width:100%; padding:20px; font-size:15px;" onclick="handleLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
        <div class="logo-sub">PERFORMANCE HUB</div>
        <button class="btn-reg" style="margin-top:30px; width:100%; background: #2a2e3a;" onclick="exportToExcel()">📊 EXPORT EXCEL</button>
      </div>
      <div class="nav">
        <div class="nav-group" id="group-kpi">
          <div class="nav-group-header" onclick="toggleNavGroup('group-kpi')"><span>KPI 성과 관리</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-kpi-tracking" class="nav-item active" onclick="showView('tracking', 'kpi')">📊 월별 트래킹</div>
            <div id="m-kpi-history" class="nav-item" onclick="showView('history', 'kpi')">📅 연간 누적 현황</div>
            <div id="m-kpi-kpilist" class="nav-item" onclick="showView('kpilist', 'kpi')">📋 KPI 전체보기</div>
            <div id="m-kpi-logs" class="nav-item" onclick="showView('logs', 'kpi')">📜 변경 로그</div>
          </div>
        </div>
        <div class="nav-group" id="group-task">
          <div class="nav-group-header" onclick="toggleNavGroup('group-task')"><span>연간 주요 업무</span> <i>▼</i></div>
          <div class="nav-group-content">
            <div id="m-task-tracking" class="nav-item" onclick="showView('tracking', 'task')">📊 월별 트래킹</div>
            <div id="m-task-history" class="nav-item" onclick="showView('history', 'task')">📅 연간 누적 현황</div>
            <div id="m-task-logs" class="nav-item" onclick="showView('logs', 'task')">📜 변경 로그</div>
          </div>
        </div>
        <div id="logout-btn" class="nav-item" onclick="handleLogout()" style="margin-top: 40px; color: var(--red); opacity: 0.7;">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main" id="scroll-area">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors" id="date-controls">
          <div style="position: relative;"><div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 <i>▼</i></div><div id="year-grid" class="selector-grid-popup"></div></div>
          </div>
        <div style="text-align: right; color: var(--text3); font-size: 11px; font-family: monospace;">KPIA_OS_v7.0</div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:25px 35px;"><h3 id="modal-title" style="font-size:18px;">성과 데이터 기록</h3><button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:28px;">✕</button></div>
    <div class="modal-body" style="padding:35px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div><label style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">대상 월</label><select id="f-month" class="modal-input" onchange="updateModalLabels()"></select></div>
        <div><label id="label-team-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">담당 분류</label><select id="f-team" class="modal-input" onchange="updateKpiOptions()"></select></div>
      </div>
      <div><label id="label-item-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">성과 항목</label><select id="f-kpi" class="modal-input" style="border-color:var(--accent); color:var(--accent); font-weight:800;"></select></div>
      <div><label id="label-last" style="display:block; font-size:12px; color:var(--green); margin-bottom:10px; font-weight:800;">전월 실적</label><textarea id="f-last" class="modal-input" style="height:120px; line-height:1.6;"></textarea></div>
      <div><label id="label-this" style="display:block; font-size:12px; color:var(--accent); margin-bottom:10px; font-weight:800;">금월 계획</label><textarea id="f-this" class="modal-input" style="height:120px; line-height:1.6;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:15px; margin-top:10px;"><button class="btn-reg" style="flex:2; padding:20px; font-size:15px;" onclick="saveData()">데이터 저장하기</button><button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">삭제</button></div>
      <div id="lock-msg" style="display:none; color:var(--red); font-size:14px; font-weight:800; text-align:center; padding:20px; background:rgba(239,68,68,0.1); border-radius:12px;">마감된 데이터는 수정할 수 없습니다.</div>

<script>
function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === 'kpia' && p === 'kpia123!') {
    sessionStorage.setItem('k_uid', i); sessionStorage.setItem('k_token_final', btoa(Date.now())); checkAuth();
  } else { alert("인증 정보가 올바르지 않습니다."); }
}
function checkAuth() { if (sessionStorage.getItem('k_token_final')) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; updateDateDisplays(); render(); } }

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_TEAMS = ['기획홍보팀', '대외정책팀', '차트운영팀', '경영지원팀', '개발파트'];
const KPI_DATA_FULL = {
  '기획홍보팀': [{ item:'신규 사업 개발' }, { item:'협회 언론 대응' }, { item:'최소 보도량 달성률' }, { item:'MWM 콘퍼런스' }, { item:'써클차트 브랜딩' }],
  '대외정책팀': [{ item:'정책파트너십 강화' }, { item:'이슈 공론화' }, { item:'법안 입법관리' }, { item:'정책 아이템 개발' }],
  '차트운영팀': [{ item:'클린 데이터 선행관리' }, { item:'운영 효율화' }, { item:'브랜딩' }, { item:'파트너십 수익 증대' }],
  '경영지원팀': [{ item:'회계 투명성 확보' }, { item:'일반 관리 효율화' }, { item:'내부 회계 통제' }, { item:'인사/노무 관리' }],
  '개발파트': [{ item:'시스템 안정 운영' }, { item:'시스템 개선' }, { item:'시스템 클라우드 이전' }, { item:'정산분배 시스템 런칭' }]
};

const TASK_TEAMS = ['음악산업 지원확대', '입법 대응', '정책 기능 강화', '회원사 권익보호', '회원사 지원교류', '저작권 투명성 IT', '협회 자체 사업', '압도적 투명성 운영'];
const TASK_DATA_FULL = {
  '음악산업 지원확대': [{ item:'정부의 대중음악 전담 조직 추진', owner:'우승현, 최태영' },{ item:'K-뮤직 펀드 조성 추진', owner:'우승현, 전종봉' },{ item:'음악관련 예산 증대 및 아이템 발굴', owner:'임숙형, 전종봉' },{ item:'음반·MD 수출 지원 정책 개발', owner:'우승현, 김창규' }],
  '입법 대응': [{ item:'대중법 일부개정 등 규제 대응', owner:'최태영, 전종봉' },{ item:'안무저작권 표준계약서 제정 지원', owner:'최태영, 전종봉' },{ item:'제작비 세액 공제 적용 추진', owner:'최태영, 전종봉' },{ item:'AI 저작권 업계 가이드 대응', owner:'최태영, 김창규' }],
  '정책 기능 강화': [{ item:'협회 내 정책연구소 설립 추진', owner:'우승현, 최태영' },{ item:'MWM 콘퍼런스 개선 진행', owner:'임숙형' },{ item:'국회 정책제안 포럼 개최', owner:'최태영, 전종봉' }],
  '회원사 권익보호': [{ item:'근로시간 52시간 유연 적용', owner:'최태영, 김창규' },{ item:'전송서비스 징수규정 개정 대응', owner:'최태영, 김창규' },{ item:'숏폼콘텐츠 징수규정 개정 대응', owner:'최태영, 김창규' },{ item:'시상식 가이드라인 제정/발효', owner:'최태영, 전종봉' },{ item:'음반 제작/판매 조세특례 추진', owner:'최태영, 전종봉' }],
  '회원사 지원교류': [{ item:'대중음악 특성 인력 양성', owner:'최태영, 전종봉' },{ item:'음악산업 리브랜딩 전략 수립', owner:'임숙형' },{ item:'업계/회원사 사업 활동 기획', owner:'임숙형' },{ item:'건강검진 단체계약', owner:'지원파트' }],
  '저작권 투명성 IT': [{ item:'방송 음악 모니터링 시스템', owner:'최태영, 김창규' },{ item:'음원-권리정보 통합DB 운영', owner:'최태영, 김창규' },{ item:'라이브러리음악 UCI 시스템',owner:'최태영, 김창규' },{ item:'K-팝 음원코드 체계 정비', owner:'최태영, 김창규' }],
  '협회 자체 사업': [{ item:'써클차트 운영', owner:'정다운' },{ item:'K-팝 번역지원서비스', owner:'정다운' }],
  '압도적 투명성 운영': [{ item:'감사제도/내부회계 제도 정비', owner:'우승현, 이충근' },{ item:'회계 컨설팅 및 외감/세무', owner:'이충근, 최지원' }]
};

let currentYear = 2026, currentMonth = 3; // 4월 기준
let currentView = 'tracking', currentCategory = 'kpi', currentHistoryTeam = KPI_TEAMS[0];
let db = JSON.parse(localStorage.getItem('k_total_db_v6') || '[]');
let logs = JSON.parse(localStorage.getItem('k_total_logs_v6') || '[]');

const rNow = new Date(), rY = rNow.getFullYear(), rM = rNow.getMonth();

function toggleNavGroup(id) { document.getElementById(id).classList.toggle('closed'); }

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  const yg = document.getElementById('year-grid'); yg.innerHTML = "";
  for(let y=2024; y<=2027; y++) {
    const d = document.createElement('div'); d.className=`grid-item ${y===currentYear?'active':''}`; d.textContent=y+"년";
    d.onclick=(e)=>{e.stopPropagation();currentYear=y;updateDateDisplays();render();}; yg.appendChild(d);
  }
}

function showView(view, category) {
  currentView = view; currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS[0] : TASK_TEAMS[0]);
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById(`m-${category}-${view}`); if(btn) btn.classList.add('active');
  const titles = { 'tracking':'월별 트래킹', 'history':'연간 누적 현황', 'kpilist':'KPI 전체보기', 'logs':'변경 로그' };
  document.getElementById('page-title').innerHTML = titles[view];
  render();
}

function render() {
  const container = document.getElementById('main-content');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  const dataList = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);

  if (currentView === 'logs') {
    const filtered = logs.filter(l => l.category === currentCategory.toUpperCase());
    let logHtml = `<div class="log-terminal">`;
    if(filtered.length === 0) { logHtml += `<div class="log-line"><span class="log-msg" style="opacity:0.4;">// status: log_empty. no entries found.</span></div>`; } 
    else { filtered.forEach((l, i) => { logHtml += `<div class="log-line"><span class="log-num">${filtered.length-i}</span><span class="log-time">${l.time}</span><span class="log-action action-${l.action}">${l.action.toUpperCase()}</span><span class="log-meta">#${l.team.replace(/\s/g,'')}</span><span class="log-msg">-> "${l.item}" : ${l.details}</span></div>`; }); }

        { team: '기획홍보팀', item: '협회 언론 대응', weight: '20%', guide: '주요 이슈 발생 시 협회 입장 대변 및 보도자료 배포, 위기 관리' },
        { team: '기획홍보팀', item: '최소 보도량 달성률', weight: '20%', guide: '정기 보도자료 및 기획 기사 노출 목표 수치 대비 달성도' },
        { team: '기획홍보팀', item: 'MWM 콘퍼런스', weight: '20%', guide: '콘퍼런스 기획, 연사 섭외, 홍보 및 행사 운영 전반의 성과' },
        { team: '기획홍보팀', item: '써클차트 브랜딩', weight: '20%', guide: '차트 인지도 제고를 위한 마케팅 캠페인 및 대외 홍보 활동' },
        { team: '대외정책팀', item: '정책파트너십 강화', weight: '25%', guide: '유관 기관, 국회, 정부 부처와의 네트워크 구축 및 협력 체계 유지' },
        { team: '대외정책팀', item: '이슈 공론화', weight: '25%', guide: '산업 내 주요 현안에 대한 세미나, 포럼 개최 및 여론 형성' },
        { team: '대외정책팀', item: '법안 입법관리', weight: '25%', guide: '음악산업 관련 법안 발의 현황 모니터링 및 대응 논리 개발' },
        { team: '대외정책팀', item: '정책 아이템 개발', weight: '25%', guide: '산업 발전을 위한 신규 정책 제안서 작성 및 제도 개선 요구' },
        { team: '차트운영팀', item: '클린 데이터 선행관리', weight: '30%', guide: '차트 데이터 검증 프로세스 강화 및 어뷰징 차단 데이터 무결성 확보' },
        { team: '차트운영팀', item: '운영 효율화', weight: '20%', guide: '데이터 집계 및 정산 프로세스 자동화 등을 통한 업무 리소스 절감' },
        { team: '차트운영팀', item: '브랜딩', weight: '20%', guide: '차트 리포트 발간 및 데이터 기반 인사이트 제공을 통한 전문성 강화' },
        { team: '차트운영팀', item: '파트너십 수익 증대', weight: '30%', guide: '국내외 플랫폼 데이터 공급 계약 체결 및 수수료 수익 관리' },
        { team: '경영지원팀', item: '회계 투명성 확보', weight: '25%', guide: '회계 투명성 및 외감 대응, 결산 관리 시스템 구축 수준' },
        { team: '경영지원팀', item: '일반 관리 효율화', weight: '25%', guide: '구매 관리, 자산 관리 등 협회 행정 프로세스 개선 건수' },
        { team: '경영지원팀', item: '내부 회계 통제', weight: '25%', guide: '회계 사고 방지 및 내부 회계 통제 제도 정착 및 안정적 운영' },
        { team: '경영지원팀', item: '인사/노무 관리', weight: '25%', guide: '임직원 근태, 복리후생 관리 및 최신 노무 규정 준수 여부' },
        { team: '개발파트', item: '시스템 안정 운영', weight: '30%', guide: '서버 가동률 99.9% 유지 및 장애 발생 시 즉각 대응/복구' },
        { team: '개발파트', item: '시스템 개선', weight: '20%', guide: '기존 내부 시스템 기능 고도화 및 사용자 UI/UX 편의성 향상' },
        { team: '개발파트', item: '시스템 클라우드 이전', weight: '20%', guide: '인프라 비용 최적화 및 확장성을 위한 클라우드 마이그레이션 추진' },
        { team: '개발파트', item: '정산분배 시스템 런칭', weight: '30%', guide: '정확한 정산을 위한 신규 시스템 설계, 개발 및 안정화' }
    ];
    let guideHtml = `<div style="max-width: 1000px; margin: 0 auto;">`;
    KPI_TEAMS.forEach(team => {
      const teamItems = kpiGuideData.filter(d => d.team === team);
      guideHtml += `<section style="margin-bottom:50px;"><div class="team-badge">${team}</div><table class="kpi-table"><thead><tr><th style="width: 200px;">성과 지표 항목</th><th style="width: 100px; text-align:center;">가중치</th><th>지표 정의 및 측정 가이드</th></tr></thead><tbody>${teamItems.map(row => `<tr><td style="font-weight:800; color:#fff;">${row.item}</td><td style="text-align:center; font-weight:900; color:var(--orange);">${row.weight}</td><td style="color:var(--text2); line-height:1.7;">${row.guide}</td></tr>`).join('')}</tbody></table></section>`;
    });
    container.innerHTML = guideHtml + `</div>`; return;
  }

  if (currentView === 'history') {
    let html = `<div style="max-width: 1100px; margin: 0 auto;"><div class="shortcut-wrapper"><div class="shortcut-grid">${teams.map(t => `<div class="shortcut-btn ${t === currentHistoryTeam ? 'active' : ''}" onclick="currentHistoryTeam='${t}';render();">${t}</div>`).join('')}</div></div>`;
    for(let m = 0; m < 12; m++) {
      const hData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === m && d.team === currentHistoryTeam);
      if(hData.length > 0) { html += `<div style="margin-bottom:60px;"><div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;"><span style="font-size:22px; font-weight:900; color:var(--orange);">${m+1}월 기록</span><div style="flex:1; height:1px; background:var(--border);"></div></div><div class="grid-2">${hData.map(d => `<div class="panel" style="margin-bottom:0;"><div class="panel-header" style="border:none; font-size:14px; color:var(--accent);">${d.item}</div><div style="padding:0 25px 25px;"><div style="margin-bottom:15px;"><div style="font-size:11px; color:var(--green); font-weight:800; margin-bottom:5px;">[실적]</div><div style="font-size:13px; line-height:1.6;">${d.lastDone}</div></div><div><div style="font-size:11px; color:var(--accent); font-weight:800; margin-bottom:5px;">[계획]</div><div style="font-size:13px; line-height:1.6;">${d.thisPlan}</div></div></div></div>`).join('')}</div></div>`; }
    }
    container.innerHTML = html + "</div>"; return;
  }

  /* 월별 트래킹 (3월/4월 상하 배치 고정) */
  if (currentView === 'tracking') {
    const targetMonths = [2, 3]; // 3월(idx 2), 4월(idx 3)
    let trackingHtml = "";
    
    targetMonths.forEach(mIdx => {
      const mData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === mIdx);
      const isPastMonth = (currentYear < rY) || (currentYear === rY && mIdx < rM);
      
      trackingHtml += `
        <div style="margin-bottom: 80px;">
          <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px; padding: 0 10px;">
            <h3 style="font-size:28px; font-weight:900; color:var(--accent);">${MONTHS[mIdx]} 트래킹 현황</h3>
            <div style="flex:1; height:2px; background:linear-gradient(to right, var(--accent), transparent);"></div>
            <span style="font-size:12px; color:var(--text3); font-weight:600; letter-spacing:1px;">CORE_V7_STATUS</span>
          </div>
          <div class="grid-2">
            ${teams.map((team, idx) => `
              <div class="panel" id="sec-${mIdx}-${idx}">
                <div class="panel-header">
                  <span>${team} <span class="month-badge">${MONTHS[mIdx]}</span></span>
                  <button class="btn-reg" style="padding:6px 12px; font-size:11px;" onclick="openModal(null, '${team}', null, ${mIdx})">+ 직접등록</button>

                <div style="padding-bottom:15px;">
                  ${dataList[team].map(k => {
                    const entry = mData.find(d => String(d.team) === String(team) && String(d.item) === String(k.item));
                    return `
                    <div class="tracking-card ${isPastMonth ? 'locked' : ''}" onclick="${isPastMonth ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}', ${mIdx})`}">
                      <div class="card-title">
                        ${k.item}
                        ${k.owner ? `<span style="font-weight:600; font-size:10px; color:var(--text3);">담당: ${k.owner}</span>` : ''}
                      </div>
                      <div class="card-content">
                        <div class="data-box">
                          <span class="data-label" style="color:var(--green);">● ${mIdx === 0 ? '12월' : mIdx + '월'} 실적</span>
                          <div class="data-value">${entry ? entry.lastDone : '<span style="opacity:0.3">기록 없음</span>'}</div>
                        </div>
                        <div class="data-box">
                          <span class="data-label" style="color:var(--accent);">● ${mIdx+1}월 계획</span>
                          <div class="data-value">${entry ? entry.thisPlan : '<span style="opacity:0.3">계획 없음</span>'}</div>
                        </div>
                      </div>
                    </div>`;
                  }).join('')}

              </div>
            `).join('')}
          </div>

    });
    container.innerHTML = trackingHtml;
  }
}

function openModal(id = null, teamHint = null, itemHint = null, monthHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  
  if (id && id !== '') {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = ''; 
    fMonth.value = monthHint !== null ? monthHint : currentMonth; // 요청된 월 자동 선택
    fTeam.value = teamHint || teams[0];
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  const isLocked = (currentYear < rY) || (currentYear === rY && parseInt(fMonth.value) < rM);
  document.getElementById('modal-footer').style.display = isLocked ? 'none' : 'flex';
  document.getElementById('lock-msg').style.display = isLocked ? 'block' : 'none';
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() { const m = parseInt(document.getElementById('f-month').value); document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 주요 실적`; document.getElementById('label-this').innerHTML = `${m+1}월 주요 계획`; }
function updateKpiOptions() { const t = document.getElementById('f-team').value; const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL); document.getElementById('f-kpi').innerHTML = list[t] ? list[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('') : ''; }
function saveData() {
  const id = document.getElementById('f-id').value, team = document.getElementById('f-team').value, item = document.getElementById('f-kpi').value, last = document.getElementById('f-last').value, plan = document.getElementById('f-this').value, m = parseInt(document.getElementById('f-month').value);
  const now = new Date(); const time = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const old = db.find(x => String(x.id) === String(id)); const action = old ? '수정' : '등록';
  logs.unshift({ time, action, category: currentCategory.toUpperCase(), team, item, details: `res: ${last.substring(0,30)}... / plan: ${plan.substring(0,30)}...` });
  const entry = { id: id || Date.now(), type: currentCategory, year: currentYear, month: m, team, item, lastDone: last, thisPlan: plan };
  db = db.filter(d => String(d.id) !== String(entry.id)); db.push(entry);
  localStorage.setItem('k_total_db_v6', JSON.stringify(db)); localStorage.setItem('k_total_logs_v6', JSON.stringify(logs)); closeModal(); render();
}
function deleteData() { const id = document.getElementById('f-id').value; if(confirm('영구 삭제하시겠습니까?')) { db = db.filter(x => String(x.id) !== String(id)); localStorage.setItem('k_total_db_v6', JSON.stringify(db)); closeModal(); render(); } }
function exportToExcel() { let csv = "Category,Year,Month,Team,Item,Result,Plan\n"; db.forEach(d => { csv += `${d.type},${d.year},${d.month+1},${d.team},"${d.item}","${d.lastDone.replace(/"/g,'')}","${d.thisPlan.replace(/"/g,'')}"\n`; }); const b = new Blob(["\ufeff"+csv], { type:'text/csv;charset=utf-8;' }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `KPIA_MGMT_DB.csv`; a.click(); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleLogout() { sessionStorage.clear(); location.reload(); }
function togglePopup(e, id) { e.stopPropagation(); const target = document.getElementById(id); const isVisible = target.style.display === 'grid'; document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); target.style.display = isVisible ? 'none' : 'grid'; }
function closeAllPopups(e) { if (!e.target.closest('.date-selectors')) document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }
window.onload = checkAuth;
</script>
