<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 성과 및 업무 통합 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.08);
  --text: #e8eaf0; --text2: #a1a8b5; --text3: #636b7f;
  --accent: #5b7cff; --accent-light: rgba(91,124,255,0.15);
  --orange: #ff6b00; --orange-light: rgba(255,107,0,0.15);
  --green: #22c55e; --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인/사이드바 등 기본 구조 유지 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
.kpia-logo-svg { width: 110px; height: auto; display: block; margin: 0 auto 15px; overflow: visible; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1.8px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.logo-section { padding: 40px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: 2px; margin-top: 10px; }
.nav { padding: 15px 0; flex: 1; overflow-y: auto; }
.nav-group-header { padding: 16px 24px; font-size: 13px; font-weight: 800; color: var(--text3); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 30px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; margin: 2px 10px; border-radius: 12px; }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 800; }

.main { flex: 1; overflow-y: auto; background: #0a0c10; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
.topbar { padding: 20px 40px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: rgba(13,15,20,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }

.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
.grid-trigger:hover { background: var(--surface); border-color: var(--accent); }

/* 월별 트래킹: 횡형 레이아웃 스타일 */
.content { padding: 40px; max-width: 1600px; margin: 0 auto; width: 100%; }
.grid-full { display: flex; flex-direction: column; gap: 30px; }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
.panel-header { padding: 20px 28px; border-bottom: 1px solid var(--border); font-weight: 800; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }

.tracking-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.tracking-card-wide { background: var(--bg3); border-radius: 16px; padding: 20px 25px; border: 1px solid transparent; display: grid; grid-template-columns: 280px 1fr; gap: 30px; align-items: center; transition: 0.2s; cursor: pointer; }
.tracking-card-wide:hover { border-color: var(--accent); background: #22283a; }
.card-info { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 20px; }
.card-data-stack { display: flex; flex-direction: column; gap: 12px; }
.data-row { display: grid; grid-template-columns: 100px 1fr; align-items: flex-start; }
.data-row label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 3px; }
.data-row .val { font-size: 13.5px; line-height: 1.5; color: var(--text2); }

/* KPI 전체보기 그리드 박스 디자인 */
.kpi-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
.kpi-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; transition: 0.3s; }
.kpi-box:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.kpi-weight-badge { position: absolute; top: 20px; right: 20px; background: var(--orange-light); color: var(--orange); font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 6px; }
.kpi-box-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 15px; padding-right: 40px; }
.kpi-box-guide { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* 공용 */
.btn-reg { background: var(--accent); color: white; padding: 8px 16px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; }
.selector-grid-popup { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 1000; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
.grid-item { padding: 12px; text-align: center; border-radius: 10px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }

/* 변경 로그 터미널 */
.log-terminal { background: #0a0c12; border-radius: 16px; padding: 25px; font-family: 'Fira Code', monospace; font-size: 12px; line-height: 1.6; border: 1px solid var(--border); }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
    <div style="font-size:14px; font-weight:800; margin-bottom:30px; color:var(--text3); letter-spacing: 2px;">MANAGEMENT SYSTEM</div>
    <input type="text" id="login-id" class="modal-input" placeholder="ID">
    <input type="password" id="login-pw" class="modal-input" placeholder="PASSWORD">
    <button class="btn-reg" style="width:100%; padding:20px; font-size:15px;" onclick="handleLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35"><text x="0" y="28" font-size="28">KPIA</text><circle cx="78" cy="22" r="3.5" /></svg>
        <div class="logo-sub">PERFORMANCE HUB</div>
        <button class="btn-reg" style="margin-top:30px; width:100%; background: #2a2e3a;" onclick="exportToExcel()">📊 EXPORT EXCEL</button>
      </div>
      <div class="nav">
        <div class="nav-group">
          <div class="nav-group-header"><span>KPI 성과 관리</span></div>
          <div id="m-kpi-tracking" class="nav-item active" onclick="showView('tracking', 'kpi')">📊 월별 트래킹</div>
          <div id="m-kpi-history" class="nav-item" onclick="showView('history', 'kpi')">📅 연간 누적 현황</div>
          <div id="m-kpi-kpilist" class="nav-item" onclick="showView('kpilist', 'kpi')">📋 KPI 전체보기</div>
          <div id="m-kpi-logs" class="nav-item" onclick="showView('logs', 'kpi')">📜 변경 로그</div>
        </div>
        <div class="nav-group" style="margin-top:20px;">
          <div class="nav-group-header"><span>연간 주요 업무</span></div>
          <div id="m-task-tracking" class="nav-item" onclick="showView('tracking', 'task')">📊 월별 트래킹</div>
          <div id="m-task-history" class="nav-item" onclick="showView('history', 'task')">📅 연간 누적 현황</div>
          <div id="m-task-logs" class="nav-item" onclick="showView('logs', 'task')">📜 변경 로그</div>
        </div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 40px; color: var(--red); opacity: 0.7;">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main" id="scroll-area">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors">
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div>
            <div id="year-grid" class="selector-grid-popup"></div>
          </div>
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div>
            <div id="month-grid" class="selector-grid-popup"></div>
          </div>
        </div>
        <div style="text-align: right; color: var(--text3); font-size: 11px; font-family: monospace;">KPIA_UX_v8.0</div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:25px 35px;"><h3 id="modal-title">기록 관리</h3><button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:28px;">✕</button></div>
    <div class="modal-body" style="padding:35px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div><label style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">대상 월</label><select id="f-month" class="modal-input" onchange="updateModalLabels()"></select></div>
        <div><label id="label-team-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">분류</label><select id="f-team" class="modal-input" onchange="updateKpiOptions()"></select></div>
      </div>
      <div><label id="label-item-type" style="display:block; font-size:12px; color:var(--text3); margin-bottom:10px; font-weight:800;">항목</label><select id="f-kpi" class="modal-input"></select></div>
      <div><label id="label-last" style="display:block; font-size:12px; color:var(--green); margin-bottom:10px; font-weight:800;">실적</label><textarea id="f-last" class="modal-input" style="height:100px;"></textarea></div>
      <div><label id="label-this" style="display:block; font-size:12px; color:var(--accent); margin-bottom:10px; font-weight:800;">계획</label><textarea id="f-this" class="modal-input" style="height:100px;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:15px; margin-top:10px;"><button class="btn-reg" style="flex:2; padding:15px;" onclick="saveData()">저장</button><button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">삭제</button></div>
      <div id="lock-msg" style="display:none; text-align:center; padding:15px; color:var(--red);">마감된 월입니다.</div>
    </div>
  </div>
</div>

<script>
/* 데이터 정의 */
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_TEAMS = ['기획홍보팀', '대외정책팀', '차트운영팀', '경영지원팀', '개발파트'];
const KPI_DATA_FULL = {
  '기획홍보팀': [{ item:'신규 사업 개발' }, { item:'협회 언론 대응' }, { item:'최소 보도량 달성률' }, { item:'MWM 콘퍼런스' }, { item:'써클차트 브랜딩' }],
  '대외정책팀': [{ item:'정책파트너십 강화' }, { item:'이슈 공론화' }, { item:'법안 입법관리' }, { item:'정책 아이템 개발' }],
  '차트운영팀': [{ item:'클린 데이터 선행관리' }, { item:'운영 효율화' }, { item:'브랜딩' }, { item:'파트너십 수익 증대' }],
  '경영지원팀': [{ item:'외부 회계 감사' }, { item:'내부 통제 강화' }, { item:'보상금 회계프로세스' },
  '개발파트': [{ item:'시스템 안정 운영' }, { item:'시스템 개선' }, { item:'시스템 클라우드 이전' }, { item:'정산분배 시스템 런칭' }]
};
const TASK_TEAMS = ['음악산업 지원확대', '입법 대응', '정책 기능 강화', '회원사 권익보호', '회원사 지원교류', '저작권 투명성 IT', '협회 자체 사업', '압도적 투명성 운영'];
const TASK_DATA_FULL = {
  '음악산업 지원확대': [{ item:'정부의 대중음악 전담 조직 추진', owner:'우승현, 최태영' },{ item:'K-뮤직 펀드 조성 추진', owner:'우승현, 전종봉' },{ item:'음악관련 예산 증대', owner:'임숙형, 전종봉' },{ item:'음반·MD 수출 지원 정책', owner:'우승현, 김창규' }],
  '입법 대응': [{ item:'대중법 일부개정 규제 대응', owner:'최태영, 전종봉' },{ item:'안무저작권 표준계약서 지원', owner:'최태영, 전종봉' },{ item:'제작비 세액 공제 추진', owner:'최태영, 전종봉' },{ item:'AI 저작권 가이드 대응', owner:'최태영, 김창규' }],
  '정책 기능 강화': [{ item:'협회 정책연구소 설립', owner:'우승현, 최태영' },{ item:'MWM 콘퍼런스 개선', owner:'임숙형' },{ item:'국회 정책제안 포럼', owner:'최태영, 전종봉' }],
  '회원사 권익보호': [{ item:'근로시간 52시간 유연 적용', owner:'최태영, 김창규' },{ item:'전송서비스 징수규정 대응', owner:'최태영, 김창규' },{ item:'숏폼콘텐츠 징수규정 대응', owner:'최태영, 김창규' },{ item:'시상식 가이드라인 발효', owner:'최태영, 전종봉' },{ item:'음반 제작 조세특례 추진', owner:'최태영, 전종봉' }],
  '회원사 지원교류': [{ item:'대중음악 특성 인력 양성', owner:'최태영, 전종봉' },{ item:'음악산업 리브랜딩 전략', owner:'임숙형' },{ item:'회원사 사업 활동 기획', owner:'임숙형' },{ item:'건강검진 단체계약', owner:'지원파트' }],
  '저작권 투명성 IT': [{ item:'방송 음악 모니터링 시스템', owner:'최태영, 김창규' },{ item:'음원-권리정보 통합DB', owner:'최태영, 김창규' },{ item:'라이브러리음악 UCI 시스템',owner:'최태영, 김창규' },{ item:'K-팝 음원코드 정비', owner:'최태영, 김창규' }],
  '협회 자체 사업': [{ item:'써클차트 운영', owner:'정다운' },{ item:'K-팝 번역지원서비스', owner:'정다운' }],
  '압도적 투명성 운영': [{ item:'내부회계 제도 정비', owner:'우승현, 이충근' },{ item:'회계 컨설팅 및 외감', owner:'이충근, 최지원' }]
};

/* 상태 관리 */
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 시스템 현재 월
let currentView = 'tracking', currentCategory = 'kpi';
let db = JSON.parse(localStorage.getItem('k_total_db_v6') || '[]');
let logs = JSON.parse(localStorage.getItem('k_total_logs_v6') || '[]');

const rY = new Date().getFullYear(), rM = new Date().getMonth();

function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === 'kpia' && p === 'kpia123!') {
    sessionStorage.setItem('k_uid', i); sessionStorage.setItem('k_token_final', btoa(Date.now())); checkAuth();
  } else { alert("인증 실패"); }
}

function checkAuth() {
  if (sessionStorage.getItem('k_token_final')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateDateDisplays(); render();
  }
}

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'), mg = document.getElementById('month-grid');
  yg.innerHTML = ""; mg.innerHTML = "";
  [2024,2025,2026,2027].forEach(y => {
    yg.innerHTML += `<div class="grid-item ${y===currentYear?'active':''}" onclick="currentYear=${y};updateDateDisplays();render();">${y}년</div>`;
  });
  MONTHS.forEach((m,i) => {
    mg.innerHTML += `<div class="grid-item ${i===currentMonth?'active':''}" onclick="currentMonth=${i};updateDateDisplays();render();">${m}</div>`;
  });
}

function showView(view, category) {
  currentView = view; currentCategory = category;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById(`m-${category}-${view}`).classList.add('active');
  document.getElementById('page-title').textContent = (view === 'tracking') ? '월별 트래킹' : (view==='history'?'연간 누적 현황':'KPI 전체보기');
  render();
}

function render() {
  const container = document.getElementById('main-content');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  const dataList = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  const isPastMonth = (currentYear < rY) || (currentYear === rY && currentMonth < rM);

  /* 1. 월별 트래킹 (횡형 레이아웃) */
  if (currentView === 'tracking') {
    const mData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === currentMonth);
    let html = `<div class="grid-full">`;
    teams.forEach(team => {
      html += `
      <div class="panel">
        <div class="panel-header"><span>${team} <span style="color:var(--accent); margin-left:10px;">${currentMonth+1}월</span></span><button class="btn-reg" onclick="openModal(null, '${team}', null, ${currentMonth})">ADD</button></div>
        <div class="tracking-list">
          ${dataList[team].map(k => {
            const entry = mData.find(d => String(d.team) === String(team) && String(d.item) === String(k.item));
            return `
            <div class="tracking-card-wide" onclick="${isPastMonth ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}', ${currentMonth})`}">
              <div class="card-info">
                <div style="font-weight:900; color:#fff; font-size:15px; margin-bottom:5px;">${k.item}</div>
                ${k.owner ? `<div style="font-size:11px; color:var(--text3);">PIC: ${k.owner}</div>` : ''}
              </div>
              <div class="card-data-stack">
                <div class="data-row">
                  <label style="color:var(--green);">[${currentMonth === 0 ? '12월' : currentMonth + '월'} 실적]</label>

/* 데이터 처리 기능 (Save, Delete 등 생략 - 로직 동일) */
function openModal(id = null, teamHint = null, itemHint = null, monthHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  if (id && id !== '') {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = monthHint; fTeam.value = teamHint;
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
  }
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function updateModalLabels() { /* Label Logic */ }
function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  document.getElementById('f-kpi').innerHTML = list[t] ? list[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('') : '';
}
function saveData() {
  const id = document.getElementById('f-id').value, team = document.getElementById('f-team').value, item = document.getElementById('f-kpi').value, last = document.getElementById('f-last').value, plan = document.getElementById('f-this').value, m = parseInt(document.getElementById('f-month').value);
  const entry = { id: id || Date.now(), type: currentCategory, year: currentYear, month: m, team, item, lastDone: last, thisPlan: plan };
  db = db.filter(d => String(d.id) !== String(entry.id)); db.push(entry);
  localStorage.setItem('k_total_db_v6', JSON.stringify(db)); closeModal(); render();
}
function deleteData() { /* Delete Logic */ }
function togglePopup(e, id) { e.stopPropagation(); document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'grid'; }
function closeAllPopups() { document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }
function handleLogout() { sessionStorage.clear(); location.reload(); }
