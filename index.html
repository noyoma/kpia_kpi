<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 통합 성과 및 업무 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.08);
  --text: #e8eaf0; --text2: #a1a8b5; --text3: #636b7f;
  --accent: #5b7cff; --accent-light: rgba(91,124,255,0.15);
  --orange: #ff6b00; --orange-light: rgba(255,107,0,0.15);
  --green: #22c55e; --red: #ef4444;
  --topbar-h: 74px;
  --lnb-h: 66px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
.login-box .modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text); margin-bottom: 15px; outline: none; font-family: 'Pretendard', sans-serif; font-size: 14px; }

.kpia-logo-svg { width: 110px; height: auto; display: block; margin: 0 auto 15px; overflow: visible; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1.8px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

/* 사이드바 */
.sidebar { width: 265px; min-width: 265px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; overflow-y: auto; }
.logo-section { padding: 35px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 9px; font-weight: 800; color: var(--text3); letter-spacing: 2px; margin-top: 8px; }

.nav { padding: 10px 0; flex: 1; }
.nav-group { margin-bottom: 5px; }
.nav-group-header {
  padding: 14px 24px; font-size: 13px; font-weight: 900; color: var(--text3);
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  background: rgba(255,255,255,0.01); transition: 0.2s;
}
.nav-group-header:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.nav-group-arrow { transition: transform 0.2s; }
.nav-group.closed .nav-group-content { display: none; }
.nav-group.closed .nav-group-arrow { transform: rotate(-90deg); }

.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 30px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 800; }

/* 메인 영역 - 스크롤 컨텍스트 */
.main {
  flex: 1;
  overflow: hidden;
  background: #0a0c10;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* 상단바 - sticky (메인 내부에서) */
.topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  background: rgba(10, 12, 18, 0.98);
  backdrop-filter: blur(20px);
  z-index: 1000;
  flex-shrink: 0;
}
.topbar h2 { font-size: 18px; font-weight: 900; color: #fff; white-space: nowrap; }

.date-selectors { display: flex; gap: 12px; align-items: center; justify-content: center; min-width: 260px; }
.grid-trigger {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 700; color: #fff;
  white-space: nowrap; display: flex; align-items: center; gap: 6px;
}
.grid-trigger:hover { border-color: var(--accent); }

/* LNB - 고정 위치 (flex-shrink: 0으로 항상 표시) */
.lnb-wrapper {
  flex-shrink: 0;
  padding: 12px 24px;
  background: rgba(10, 12, 18, 0.97);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border);
  z-index: 900;
}
.lnb-grid { display: grid; grid-template-columns: repeat(var(--lnb-cols, 5), 1fr); gap: 8px; }
.lnb-item {
  background: var(--bg3); border: 1px solid var(--border); padding: 13px 8px; border-radius: 10px;
  font-size: 13px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lnb-item:hover, .lnb-item.active { border-color: var(--accent); color: #fff; background: var(--accent-light); }

/* 스크롤 영역 */
.scroll-content {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

/* 월 배지 */
.month-badge { font-size: 11px; color: var(--accent); font-weight: 800; margin-left: 10px; padding: 2px 8px; background: rgba(91,124,255,0.15); border-radius: 5px; vertical-align: middle; }

/* 컨텐츠 영역 */
.content { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
.panel { scroll-margin-top: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; margin-bottom: 40px; overflow: hidden; }
.panel-header { padding: 20px 30px; border-bottom: 1px solid var(--border); font-weight: 900; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }

/* KPI Overview 전용 스타일 */
.kpi-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 25px; }
.kpi-team-label { grid-column: 1 / -1; margin-top: 20px; color: var(--accent); font-weight: 900; font-size: 14px; padding-bottom: 5px; border-bottom: 1px solid var(--accent-light); }
.kpi-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 25px; position: relative; transition: 0.3s; }
.kpi-box:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }
.kpi-weight-tag { position: absolute; top: 20px; right: 20px; background: var(--orange-light); color: var(--orange); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; }
.kpi-box-title { font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 12px; padding-right: 60px; }
.kpi-box-guide { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* 횡형 리스트 카드 */
.tracking-card-wide {
  background: var(--bg3); border-radius: 18px; padding: 22px 30px; border: 1px solid var(--border);
  display: grid; grid-template-columns: 240px 1fr; gap: 30px; align-items: start; transition: 0.2s; margin: 10px 25px; cursor: pointer;
}
.tracking-card-wide:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }

.data-stack { display: flex; flex-direction: column; gap: 14px; }
.data-block { display: flex; flex-direction: column; gap: 4px; }
.data-row { display: grid; grid-template-columns: 70px 1fr; margin-bottom: 8px; gap: 8px; }
.data-label { font-size: 11px; font-weight: 900; }
.data-val { font-size: 13px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

/* 연간 누적 현황 */
.history-month-block { border-left: 3px solid var(--orange); padding-left: 25px; margin-bottom: 40px; }
.history-month-title { color: var(--orange); font-size: 18px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; }
.history-items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.history-item-card { background: var(--bg3); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.2s; }
.history-item-card:hover { border-color: rgba(255,255,255,0.2); }
.history-item-header { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 900; color: var(--text); }
.history-item-body { padding: 14px 20px; }

/* 로그 카드 */
.log-card { background: var(--bg3); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
.log-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; gap: 8px; }
.log-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
.tag-등록 { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-수정 { background: rgba(91,124,255,0.15); color: var(--accent); }
.tag-삭제 { background: rgba(239,68,68,0.15); color: var(--red); }
.log-body { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; white-space: pre-wrap; font-size: 13px; line-height: 1.8; color: var(--text2); }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(8px); }
.modal { background: var(--bg2); width: 680px; max-width: 95vw; border-radius: 32px; border: 1px solid var(--border); overflow: hidden; max-height: 90vh; overflow-y: auto; }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); margin-bottom: 15px; outline: none; font-family: 'Pretendard', sans-serif; font-size: 14px; }
.modal-input:focus { border-color: var(--accent); }
.modal-input option { background: var(--bg3); color: var(--text); }
.btn-reg { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-family: 'Pretendard', sans-serif; font-size: 13px; transition: 0.2s; }
.btn-reg:hover { opacity: 0.85; }

/* 날짜 그리드 팝업 */
.selector-grid-popup {
  position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px;
  display: none; grid-template-columns: repeat(4, 1fr); gap: 8px;
  z-index: 1100; width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.grid-item { padding: 10px; text-align: center; border-radius: 10px; background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); border: 1px solid transparent; transition: 0.15s; }
.grid-item:hover { border-color: var(--accent); color: var(--text); }
.grid-item.active { background: var(--accent); color: white; border-color: var(--accent); }

/* 빈 상태 */
.empty-state { text-align: center; padding: 60px; color: var(--text3); }
.empty-state-icon { font-size: 40px; margin-bottom: 15px; }

/* 패널 바디 패딩 */
.panel-body { padding-bottom: 15px; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35">
      <text x="0" y="28" font-size="28">KPIA</text>

    <!-- 메인 -->

</div>

<!-- 등록/수정 모달 -->

      <h3 id="modal-title">데이터 기록</h3>

      </div>

</div>

/* ===========================
   2. 상태 관리
   =========================== */
let currentYear = 2026;
let currentMonth = new Date().getMonth(); // 0-based
let currentView = 'tracking';
let currentCategory = 'kpi';
let currentHistoryTeam = KPI_TEAMS[0];
let db = [];
let logs = [];

function loadStorage() {
  try { db = JSON.parse(localStorage.getItem('k_total_db_vfinal') || '[]'); } catch(e) { db = []; }
  try { logs = JSON.parse(localStorage.getItem('k_total_logs_vfinal') || '[]'); } catch(e) { logs = []; }
}
function saveDB() { localStorage.setItem('k_total_db_vfinal', JSON.stringify(db)); }
function saveLogs() { localStorage.setItem('k_total_logs_vfinal', JSON.stringify(logs)); }

/* ===========================
   3. 인증
   =========================== */
function handleLogin() {
  const id = document.getElementById('login-id').value.trim().toLowerCase();
  const pw = document.getElementById('login-pw').value;
  if (id === 'kpia' && pw === 'kpia123!') {
    sessionStorage.setItem('k_uid', id);
    sessionStorage.setItem('k_auth_vfinal', btoa(String(Date.now())));
    initApp();
  } else {
    alert('아이디 혹은 비밀번호가 틀립니다.');
  }
}
document.getElementById('login-pw').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});
function handleLogout() {
  sessionStorage.clear();
  location.reload();
}
function checkAuth() {
  if (sessionStorage.getItem('k_auth_vfinal')) {
    initApp();
  }
}
function initApp() {
  loadStorage();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  updateDateDisplays();
  render();
}

/* ===========================
   4. 네비게이션
   =========================== */
function toggleNavGroup(id) {
  document.getElementById(id).classList.toggle('closed');
}

function showView(view, category) {
  currentView = view;
  currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS : TASK_TEAMS)[0];

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById('m-' + category + '-' + view);
  if (btn) btn.classList.add('active');

  const viewNames = { tracking: '월별 트래킹', history: '연간 누적 현황', logs: '변경 로그', kpilist: 'KPI Overview' };
  document.getElementById('page-title').textContent = '[' + category.toUpperCase() + '] ' + (viewNames[view] || view);

  // 스크롤 맨 위로
  document.getElementById('scroll-root').scrollTop = 0;
  render();
}

/* ===========================
   5. LNB 렌더
   =========================== */
function renderLNB(teams, activeTeam, onClickFn) {
  const lnbArea = document.getElementById('lnb-area');
  if (!teams || teams.length === 0) {
    lnbArea.style.display = 'none';
    return;
  }
  lnbArea.style.display = 'block';
  const cols = teams.length;
  lnbArea.innerHTML = '<div class="lnb-grid" style="--lnb-cols:' + cols + '">' +
    teams.map(function(t) {
      return '<div class="lnb-item ' + (t === activeTeam ? 'active' : '') + '" onclick="' + onClickFn + '(\'' + t.replace(/'/g, "\\'") + '\')">' + t + '</div>';
    }).join('') +
    '</div>';
}

/* ===========================
   6. 메인 렌더
   =========================== */
function render() {
  if (!sessionStorage.getItem('k_auth_vfinal')) return;
  const container = document.getElementById('main-content');
  const teams = currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS;
  const dataList = currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL;

  // LNB
  if (currentView === 'tracking') {
    renderLNB(teams, null, 'scrollToSection');
  } else if (currentView === 'history') {
    renderLNB(teams, currentHistoryTeam, 'selectHistoryTeam');
  } else {
    document.getElementById('lnb-area').style.display = 'none';
  }

  // 변경 로그
  if (currentView === 'logs') {
    const filtered = logs.filter(function(l) { return l.category === currentCategory.toUpperCase(); });
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><div>기록이 없습니다.</div></div>';
    } else {
      container.innerHTML = filtered.map(function(l) {
        return '<div class="log-card">' +
          '<div class="log-header">' +
            '<div style="display:flex; align-items:center; gap:10px;">' +
              '<span class="log-tag tag-' + l.action + '">' + l.action + '</span>' +
              '<span style="color:var(--text3); font-size:11px;">' + l.time + '</span>' +
              '<span style="font-size:13px; font-weight:900;">' + l.team + ' — ' + l.item + '</span>' +
            '</div>' +
            '<span style="font-size:11px; color:var(--accent);">UID: ' + l.user + '</span>' +
          '</div>' +
          '<div class="log-body">' + escapeHtml(l.details) + '</div>' +
        '</div>';
      }).join('');
    }
    return;
  }

  // KPI Overview
  if (currentView === 'kpilist') {
    let html = '<div class="kpi-grid-container">';
    KPI_TEAMS.forEach(function(team) {
      html += '<div class="kpi-team-label">' + team + '</div>';
      KPI_GUIDE_DATA.filter(function(d) { return d.team === team; }).forEach(function(k) {
        html += '<div class="kpi-box">' +
          '<div class="kpi-weight-tag">' + k.weight + '</div>' +
          '<div class="kpi-box-title">' + k.item + '</div>' +
          '<div class="kpi-box-guide">' + k.guide + '</div>' +
        '</div>';
      });
    });
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  // 연간 누적 현황
  if (currentView === 'history') {
    let html = '<div style="max-width:1100px; margin:0 auto;">';
    let hasAny = false;
    for (let m = 0; m < 12; m++) {
      const hData = db.filter(function(d) {
        return d.type === currentCategory && d.year === currentYear && d.month === m && d.team === currentHistoryTeam;
      });
      if (hData.length > 0) {
        hasAny = true;
        html += '<div class="history-month-block">' +
          '<div class="history-month-title">' + MONTHS[m] + ' <span class="month-badge">RECORD</span></div>' +
          '<div class="history-items-grid">' +
          hData.map(function(d) {
            return '<div class="history-item-card" onclick="openModal(\'' + d.id + '\')">' +
              '<div class="history-item-header">' + d.item + '</div>' +
              '<div class="history-item-body">' +
                '<div class="data-row"><div class="data-label" style="color:var(--green);">[실적]</div><div class="data-val">' + escapeHtml(d.lastDone) + '</div></div>' +
                '<div class="data-row"><div class="data-label" style="color:var(--accent);">[계획]</div><div class="data-val">' + escapeHtml(d.thisPlan) + '</div></div>' +
              '</div>' +
            '</div>';
          }).join('') +
          '</div></div>';
      }
    }
    if (!hasAny) {
      html += '<div class="empty-state"><div class="empty-state-icon">📅</div><div>' + currentHistoryTeam + '의 ' + currentYear + '년 기록이 없습니다.</div></div>';
    }
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  // 월별 트래킹
  if (currentView === 'tracking') {
    const mData = db.filter(function(d) {
      return d.type === currentCategory && d.year === currentYear && d.month === currentMonth;
    });

    container.innerHTML = teams.map(function(team, idx) {
      const items = dataList[team] || [];
      return '<div class="panel" id="sec-' + idx + '">' +
        '<div class="panel-header">' +
          '<span>' + team + ' <span class="month-badge">' + MONTHS[currentMonth] + '</span></span>' +
          '<button class="btn-reg" onclick="openModal(null,\'' + team.replace(/'/g, "\\'") + '\')">+ 등록</button>' +
        '</div>' +
        '<div class="panel-body">' +
        (items.length === 0
          ? '<div class="empty-state" style="padding:30px;"><div>항목이 없습니다.</div></div>'
          : items.map(function(k) {
              const entry = mData.find(function(d) { return d.team === team && d.item === k.item; });
              const entryId = entry ? String(entry.id) : '';
              const lastDone = entry ? escapeHtml(entry.lastDone) : '<span style="color:var(--text3);">-</span>';
              const thisPlan = entry ? escapeHtml(entry.thisPlan) : '<span style="color:var(--text3);">-</span>';
              const ownerHtml = k.owner ? '<div style="font-size:11px; color:var(--text3); margin-top:4px;">담당: ' + k.owner + '</div>' : '';
              const prevM = currentMonth === 0 ? 11 : currentMonth - 1;
              const prevMonthLabel = MONTHS[prevM] + ' 실적';
              const thisMonthLabel = MONTHS[currentMonth] + ' 계획';
              return '<div class="tracking-card-wide" onclick="openModal(\'' + entryId + '\',\'' + team.replace(/'/g, "\\'") + '\',\'' + k.item.replace(/'/g, "\\'") + '\')">' +
                '<div style="border-right:1px solid rgba(255,255,255,0.06); padding-right:20px;">' +
                  '<div style="font-weight:900; color:#fff; font-size:15px;">' + k.item + '</div>' +
                  ownerHtml +
                '</div>' +
                '<div class="data-stack">' +
                  '<div class="data-block">' +
                    '<div class="data-label" style="color:var(--green);">' + prevMonthLabel + '</div>' +
                    '<div class="data-val">' + lastDone + '</div>' +
                  '</div>' +
                  '<div style="height:1px; background:rgba(255,255,255,0.05);"></div>' +
                  '<div class="data-block">' +
                    '<div class="data-label" style="color:var(--accent);">' + thisMonthLabel + '</div>' +
                    '<div class="data-val">' + thisPlan + '</div>' +
                  '</div>' +
                '</div>' +
              '</div>';
            }).join('')
        ) +
        '</div></div>';
    }).join('');
  }
}

function scrollToSection(team) {
  const teams = currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS;
  const idx = teams.indexOf(team);
  if (idx >= 0) {
    const el = document.getElementById('sec-' + idx);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
}

function selectHistoryTeam(team) {
  currentHistoryTeam = team;
  render();
}

   8. 모달
   =========================== */
function openModal(id, teamHint, itemHint) {
  const fMonth = document.getElementById('f-month');
  const fTeam = document.getElementById('f-team');
  const fKpi = document.getElementById('f-kpi');
  const fLast = document.getElementById('f-last');
  const fThis = document.getElementById('f-this');
  const fId = document.getElementById('f-id');
  const delBtn = document.getElementById('del-btn');

  const teams = currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS;

  // 월 옵션
  fMonth.innerHTML = MONTHS.map(function(m, i) {
    return '<option value="' + i + '">' + m + '</option>';
  }).join('');

  // 팀 옵션
  fTeam.innerHTML = teams.map(function(t) {
    return '<option value="' + t + '">' + t + '</option>';
  }).join('');

  if (id) {
    // 수정 모드
    const d = db.find(function(x) { return String(x.id) === String(id); });
    if (!d) { alert('데이터를 찾을 수 없습니다.'); return; }
    fId.value = d.id;
    fMonth.value = d.month;
    fTeam.value = d.team;
    updateKpiOptions();
    fKpi.value = d.item;
    fLast.value = d.lastDone;
    fThis.value = d.thisPlan;
    delBtn.style.display = 'block';
    document.getElementById('modal-title').textContent = '데이터 수정';
  } else {
    // 등록 모드
    fId.value = '';
    fMonth.value = currentMonth;
    fTeam.value = teamHint || teams[0];
    updateKpiOptions();
    if (itemHint) fKpi.value = itemHint;
    fLast.value = '';
    fThis.value = '';
    delBtn.style.display = 'none';
    document.getElementById('modal-title').textContent = '데이터 등록';
  }

  updateModalLabels();
  document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() {
  const m = parseInt(document.getElementById('f-month').value);
  const prevLabel = m === 0 ? '12월' : MONTHS[m - 1];
  document.getElementById('label-last').textContent = prevLabel + ' 실적';
  document.getElementById('label-this').textContent = MONTHS[m] + ' 계획';
}

function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  const list = currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL;
  const items = list[t] || [];
  document.getElementById('f-kpi').innerHTML = items.map(function(k) {
    return '<option value="' + k.item + '">' + k.item + '</option>';
  }).join('');
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

/* ===========================
   9. CRUD
   =========================== */
function saveData() {
  const fId = document.getElementById('f-id').value;
  const team = document.getElementById('f-team').value;
  const item = document.getElementById('f-kpi').value;
  const lastDone = document.getElementById('f-last').value;
  const thisPlan = document.getElementById('f-this').value;
  const month = parseInt(document.getElementById('f-month').value);

  if (!item) { alert('항목을 선택해주세요.'); return; }

  const old = db.find(function(x) { return String(x.id) === String(fId); });

  if (old) {
    let diff = '';
    if (old.lastDone !== lastDone) diff += '[실적] ' + old.lastDone + ' → ' + lastDone + '\n';
    if (old.thisPlan !== thisPlan) diff += '[계획] ' + old.thisPlan + ' → ' + thisPlan;
    addHistoryLog('수정', currentCategory, team, item, diff || '변경사항 없음');
    old.team = team;
    old.item = item;
    old.lastDone = lastDone;
    old.thisPlan = thisPlan;
    old.month = month;
    old.year = currentYear;
  } else {
    const newEntry = {
      id: Date.now(),
      type: currentCategory,
      year: currentYear,
      month: month,
      team: team,
      item: item,
      lastDone: lastDone,
      thisPlan: thisPlan
    };
    addHistoryLog('등록', currentCategory, team, item, '실적: ' + lastDone + '\n계획: ' + thisPlan);
    db.push(newEntry);
  }

  saveDB();
  closeModal();
  render();
}

function deleteData() {
  const fId = document.getElementById('f-id').value;
  const d = db.find(function(x) { return String(x.id) === String(fId); });
  if (!d) return;
  if (!confirm('정말 삭제하시겠습니까?')) return;
  addHistoryLog('삭제', currentCategory, d.team, d.item, '실적: ' + d.lastDone + ' / 계획: ' + d.thisPlan);
  db = db.filter(function(x) { return String(x.id) !== String(fId); });
  saveDB();
  closeModal();
  render();
}

function addHistoryLog(action, category, team, item, details) {
  const now = new Date();
  const uid = sessionStorage.getItem('k_uid') || 'Admin';
  const pad = function(n) { return String(n).padStart(2, '0'); };
  const time = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) +
    ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  logs.unshift({ time: time, action: action, category: category.toUpperCase(), team: team, item: item, details: details, user: uid });
  saveLogs();
}

/* ===========================
   10. 날짜 선택 팝업
   =========================== */
function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];

  const yg = document.getElementById('year-grid');
  const mg = document.getElementById('month-grid');

  yg.innerHTML = [2024,2025,2026,2027].map(function(y) {
    return '<div class="grid-item ' + (y === currentYear ? 'active' : '') + '" onclick="selectYear(' + y + ')">' + y + '년</div>';
  }).join('');

  mg.innerHTML = MONTHS.map(function(m, i) {
    return '<div class="grid-item ' + (i === currentMonth ? 'active' : '') + '" onclick="selectMonth(' + i + ')">' + m + '</div>';
  }).join('');
}

function selectYear(y) {
  currentYear = y;
  updateDateDisplays();
  closeAllPopups();
  render();
}
function selectMonth(i) {
  currentMonth = i;
  updateDateDisplays();
  closeAllPopups();
  render();
}

function togglePopup(e, id) {
  e.stopPropagation();
  const target = document.getElementById(id);
  const isVisible = target.style.display === 'grid';
  closeAllPopups();
  if (!isVisible) target.style.display = 'grid';
}
function closeAllPopups(e) {
  if (e && e.target && e.target.closest && e.target.closest('.selector-grid-popup')) return;
  document.querySelectorAll('.selector-grid-popup').forEach(function(p) { p.style.display = 'none'; });
}

/* ===========================
   11. 엑셀 내보내기
   =========================== */
function exportToExcel() {
  if (db.length === 0) { alert('내보낼 데이터가 없습니다.'); return; }
  let csv = '\uFEFFCategory,Year,Month,Team,Item,Result,Plan\n';
  const sorted = db.slice().sort(function(a, b) {
    if (a.year !== b.year) return a.year - b.year;
    return a.month - b.month;
  });
  sorted.forEach(function(d) {
    csv += [
      d.type.toUpperCase(),
      d.year,
      d.month + 1,
      '"' + d.team.replace(/"/g, '""') + '"',
      '"' + d.item.replace(/"/g, '""') + '"',
      '"' + (d.lastDone || '').replace(/"/g, '""') + '"',
      '"' + (d.thisPlan || '').replace(/"/g, '""') + '"'
    ].join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'KPIA_MGMT_' + currentYear + '_EXPORT.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ===========================
   12. 유틸
   =========================== */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ===========================
   13. 초기화
   =========================== */
window.onload = function() {
  checkAuth();
};
